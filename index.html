/* ---------- catálogos ---------- */

  estadoPermiso: ["Pendiente","Aprobado","Rechazado"],

  turnoVentana: ["Matutino","Nocturno"],

const COLOR = {
  "Activo":"green","Inactivo":"slate",
  "Pendiente":"amber","Aprobado":"green","Rechazado":"red",
  "Programada":"accent","En ejecución":"amber","Completada":"green","Cancelada":"slate",
  "Inscrito":"slate","En curso":"amber","Completado":"green","Certificado":"violet",
  "Planificado":"slate","En proceso":"amber","Fallido":"red",
};
const C = {green:"var(--green)",amber:"var(--amber)",red:"var(--red)",violet:"var(--violet)",slate:"var(--slate)",accent:"var(--accent)"};
const HEX = {green:"#22c55e",amber:"#f59e0b",red:"#ef4444",violet:"#a78bfa",slate:"#64748b",accent:"#38bdf8"};
function Pill({v}){
  const c = C[COLOR[v]] || "var(--slate)";
  return <span className="pill" style={{background:c+"22",color:c}}>{v||"—"}</span>;
}

/* ---------- iconos ---------- */
const I = {

  team:"M16 11a4 4 0 10-8 0 4 4 0 008 0zM2 21a8 8 0 0116 0",

  wind:"M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z M14 2v6h6",
  course:"M22 10L12 5 2 10l10 5 10-5zM6 12v5c0 1 3 3 6 3s6-2 6-3v-5",
  roll:"M3 12a9 9 0 109-9 9 9 0 00-6.5 2.8L3 8M3 3v5h5",
  cal:"M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V6a2 2 0 012-2z",
  plus:"M12 5v14M5 12h14",
  trash:"M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14",
  bell:"M18 8a6 6 0 00-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 01-3.4 0",
  out:"M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9",
  xls:"M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z M14 2v6h6",
  left:"M15 18l-6-6 6-6", right:"M9 18l6-6-6-6",
};
function Icon({d,size=18}){return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>;}

/* ---------- módulos ---------- */
const MODULES = {
  team:{ table:"team", label:"Equipo", icon:I.team, title:"Equipo", sub:"Registro del personal del equipo de TI",
    cols:[["numero_empleado","N° empleado"],["nombre","Nombre"],["rol","Rol"],["area","Área"],["correo","Correo"],["telefono","Teléfono"],["estado","Estado","pill"]],
    fields:[["numero_empleado","N° empleado","text"],["nombre","Nombre","text",true],["rol","Rol / puesto","text"],["area","Área","text"],["correo","Correo","email"],["telefono","Teléfono","text"],["estado","Estado","select",false,CAT.estadoPersona]],
    search:["numero_empleado","nombre","rol","area","correo"] },
  leaves:{ table:"leaves", label:"Permisos", icon:I.leave, title:"Permisos y vacaciones", sub:"Control de ausencias del personal",
    cols:[["persona","Persona"],["tipo","Tipo"],["fecha_inicio","Inicio"],["fecha_fin","Fin"],["estado","Estado","pill"],["notas","Notas"]],
    fields:[["persona","Persona","text",true],["tipo","Tipo","select",false,CAT.tipoPermiso],["fecha_inicio","Fecha inicio","date"],["fecha_fin","Fecha fin","date"],["estado","Estado","select",false,CAT.estadoPermiso],["notas","Notas","textarea"]],
    search:["persona","tipo"] },

    fields:[["persona","Persona","text",true],["tipo","Tipo","select",false,CAT.tipoGuardia],["fecha_inicio","Fecha inicio","date"],["fecha_fin","Fecha fin","date"],["notas","Notas","textarea"]],
    search:["persona","tipo"] },

    fields:[["sistema","Sistema / servicio","text",true],["turno","Turno","select",false,CAT.turnoVentana],["responsable","Responsable","text"],["fecha_hora","Fecha y hora","datetime-local"],["descripcion","Descripción","textarea"],["estado","Estado","select",false,CAT.estadoVentana]],
    search:["sistema","responsable","turno"] },
  courses:{ table:"courses", label:"Cursos", icon:I.course, title:"Cursos", sub:"Capacitación y certificaciones del equipo",
    cols:[["persona","Persona"],["curso","Curso"],["semana","Semana"],["proveedor","Proveedor"],["fecha","Fecha"],["estado","Estado","pill"]],

    fields:[["release","Release / cambio","text",true],["responsable","Responsable","text"],["fecha","Fecha","date"],["motivo","Motivo","textarea"],["resultado","Resultado","text"],["estado","Estado","select",false,CAT.estadoReverso]],
    search:["release","responsable"] },
};

/* ---------- utilidades de fecha ---------- */
function pd(s){ if(!s) return null; const p=String(s).slice(0,10).split("-").map(Number); return new Date(p[0],p[1]-1,p[2]); }
function dkey(d){ return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
function startToday(){ const t=new Date(); t.setHours(0,0,0,0); return t; }
function fmt(val,kind){
  if(val===null||val===undefined||val==="") return "—";
  if(kind==="pill") return <Pill v={val}/>;
  if(kind==="dt"){ try{return new Date(val).toLocaleString("es",{dateStyle:"medium",timeStyle:"short"});}catch{return val;} }
  return String(val);
}
function rawCell(r,col){
  const v=r[col[0]];
  if(v===null||v===undefined) return "";
  if(col[2]==="dt"){ try{return new Date(v).toLocaleString("es");}catch{return String(v);} }
  return String(v);
}

/* ---------- choques de agenda ---------- */
function computeConflicts(data){
  if(!data) return [];
  const byPerson = {}; // persona -> {leave:Set, guard:Set}
  const addDays=(persona,startS,endS,kind)=>{
    const a=pd(startS), b=pd(endS)||pd(startS);
    if(!a) return;
    byPerson[persona]=byPerson[persona]||{leave:new Set(),guard:new Set()};
    let d=new Date(a), i=0;
    while(d<=b && i<400){ byPerson[persona][kind].add(dkey(d)); d.setDate(d.getDate()+1); i++; }
  };
  data.leaves.forEach(l=> l.persona && l.estado!=="Rechazado" && addDays(l.persona,l.fecha_inicio,l.fecha_fin,"leave"));
  data.guards.forEach(g=> g.persona && addDays(g.persona,g.fecha_inicio,g.fecha_fin,"guard"));
  const out=[];
  Object.entries(byPerson).forEach(([persona,o])=>{
    o.guard.forEach(k=>{ if(o.leave.has(k)){ const p=k.split("-").map(Number); out.push({date:new Date(p[0],p[1]-1,p[2]),persona}); } });
  });
  return out.sort((a,b)=>a.date-b.date);
}

/* ---------- notificaciones ---------- */
function buildNotifs(data){
  if(!data) return [];
  const today=startToday(); const in7=new Date(today); in7.setDate(in7.getDate()+7);
  const n=[];
  data.windows.forEach(w=>{ const f=w.fecha_hora&&new Date(w.fecha_hora); if(f&&f>=today&&f<=in7&&w.estado!=="Cancelada") n.push(["accent",`Ventana próxima: ${w.sistema} (${f.toLocaleDateString("es",{day:"numeric",month:"short"})})`]); });
  data.guards.forEach(g=>{ const f=pd(g.fecha_inicio); if(f&&f>=today&&f<=in7) n.push(["violet",`Guardia próxima: ${g.persona} · ${g.tipo||""}`]); });
  data.windows.filter(w=>w.estado==="En ejecución").forEach(w=>n.push(["amber",`Ventana en ejecución: ${w.sistema}`]));
  data.leaves.filter(l=>l.estado==="Pendiente").forEach(l=>n.push(["amber",`Permiso pendiente: ${l.persona}`]));
  data.rollbacks.filter(r=>r.estado==="En proceso").forEach(r=>n.push(["amber",`Reverso en proceso: ${r.release}`]));
  data.rollbacks.filter(r=>r.estado==="Fallido").forEach(r=>n.push(["red",`Reverso fallido: ${r.release}`]));
  computeConflicts(data).forEach(c=>n.push(["red",`⚠ Choque de agenda: ${c.persona} (${c.date.toLocaleDateString("es",{day:"numeric",month:"short"})})`]));
  const rank={red:0,amber:1,violet:2,accent:3};
  return n.sort((a,b)=>rank[a[0]]-rank[b[0]]);
}

/* ============================================================ */
function App(){
  if(!CONFIGURED) return <SetupScreen/>;
  const [session,setSession] = useState(undefined);   // undefined=cargando, null=sin sesión
  const [role,setRole] = useState(null);
  const [roleLoading,setRoleLoading] = useState(false);
  const [recovery,setRecovery] = useState(false);

  useEffect(()=>{
    db.auth.getSession().then(({data})=>setSession(data.session||null));
    const {data:sub} = db.auth.onAuthStateChange((event,s)=>{
      setSession(s||null);
      if(event==="PASSWORD_RECOVERY") setRecovery(true);
    });
    return ()=> sub.subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    let alive=true;
    if(session && session.user){
      setRoleLoading(true);
      db.from("profiles").select("role").eq("id",session.user.id).single()
        .then(({data})=>{ if(!alive) return; setRole(data && data.role ? data.role : "Solo lectura"); setRoleLoading(false); });
    } else { setRole(null); }
    return ()=>{ alive=false; };
  },[session]);

  if(session===undefined) return <Splash text="Cargando…"/>;
  if(recovery && session) return <SetNewPassword onDone={()=>setRecovery(false)}/>;
  if(!session) return <Login/>;
  if(roleLoading || !role) return <Splash text="Cargando perfil…"/>;
  return <Shell role={role} email={session.user.email} onLogout={()=>db.auth.signOut()}/>;
}

function Splash({text}){
  return <div className="main"><p className="page-sub" style={{marginTop:70,textAlign:"center"}}>{text}</p></div>;

/* ---------- login (Supabase Auth) ---------- */
function Login(){
  const [mode,setMode] = useState("in");   // in = iniciar sesión, up = registrarse
  const [email,setEmail] = useState("");
  const [pw,setPw] = useState("");
  const [busy,setBusy] = useState(false);
  const [msg,setMsg] = useState(null);     // {t:"err"|"ok", m:string}

  async function submit(e){
    e.preventDefault(); setBusy(true); setMsg(null);
    if(mode==="in"){
      const {error} = await db.auth.signInWithPassword({email:email.trim(), password:pw});
      if(error) setMsg({t:"err", m:error.message});
    } else {
      const {error} = await db.auth.signUp({email:email.trim(), password:pw});
      if(error) setMsg({t:"err", m:error.message});
      else setMsg({t:"ok", m:"Cuenta creada. Si el proyecto pide confirmación, revisa tu correo. Después, un administrador debe asignarte un rol."});
    }
    setBusy(false);
  }
  async function forgot(){
    if(!email.trim()){ setMsg({t:"err", m:"Escribe tu correo arriba y vuelve a pulsar “¿Olvidaste tu contraseña?”."}); return; }
    setBusy(true); setMsg(null);
    const {error} = await db.auth.resetPasswordForEmail(email.trim(), {redirectTo: window.location.href});
    setBusy(false);
    setMsg(error ? {t:"err", m:error.message} : {t:"ok", m:"Te enviamos un correo para restablecer tu contraseña. Ábrelo y vuelve a este portal."});
  }
  return (
    <div className="main"><div className="login-wrap">
      <div className="card">
        <div className="brand" style={{justifyContent:"center"}}><Icon d={I.dash} size={24}/> Ops Team Hub</div>
        <p className="page-sub" style={{margin:"0 0 18px"}}>{mode==="in"?"Inicia sesión":"Crea tu cuenta"}</p>
        <form onSubmit={submit}>
          <div className="field" style={{textAlign:"left"}}>
            <label>Correo</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="correo@empresa.com" autoFocus required/>
          </div>
          <div className="field" style={{textAlign:"left"}}>
            <label>Contraseña</label>
            <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••" required/>
          </div>
          {msg && <p style={{color:msg.t==="err"?"var(--red)":"var(--green)",fontSize:13,margin:"0 0 12px"}}>{msg.m}</p>}
          <button className="btn" style={{width:"100%",justifyContent:"center"}} type="submit" disabled={busy}>
            {busy ? "…" : (mode==="in" ? "Entrar" : "Registrarme")}
          </button>
        </form>
        {mode==="in" && <p style={{margin:"12px 0 0",fontSize:13}}>
          <a href="#" onClick={e=>{e.preventDefault();forgot();}} style={{color:"var(--muted)"}}>¿Olvidaste tu contraseña?</a>
        </p>}
        <p className="page-sub" style={{margin:"10px 0 0",fontSize:13}}>
          {mode==="in"
            ? <>¿No tienes cuenta? <a href="#" onClick={e=>{e.preventDefault();setMsg(null);setMode("up");}} style={{color:"var(--accent)"}}>Regístrate</a></>
            : <>¿Ya tienes cuenta? <a href="#" onClick={e=>{e.preventDefault();setMsg(null);setMode("in");}} style={{color:"var(--accent)"}}>Inicia sesión</a></>}
        </p>
      </div>
    </div></div>
  );
}

/* ---------- hooks de datos ---------- */
function useAllData(key){
  const [data,setData] = useState(null);
  const [err,setErr] = useState(null);
  useEffect(()=>{ let alive=true; (async()=>{
    try{
      const tables=["team","leaves","guards","windows","courses","rollbacks"];
      const res=await Promise.all(tables.map(t=>db.from(t).select("*")));
      if(!alive) return;
      const obj={}; tables.forEach((t,i)=> obj[t]=res[i].data||[]);
      const e=res.find(r=>r.error); if(e) setErr(e.error.message); else setErr(null);
      setData(obj);
    }catch(e){ if(alive) setErr(e.message); }
  })(); return ()=>{alive=false;}; },[key]);
  return {data,err};
}
function useTable(table,onChange){
  const [rows,setRows]=useState([]); const [loading,setLoading]=useState(true); const [err,setErr]=useState(null);
  async function load(){
    setLoading(true);
    const {data,error}=await db.from(table).select("*").order("created_at",{ascending:false});
    if(error) setErr(error.message); else { setRows(data||[]); setErr(null); }
    setLoading(false);
  }
  useEffect(()=>{ load(); },[table]);
  return {rows,loading,err,load:()=>{load(); onChange&&onChange();}};
}

/* ---------- exportación ---------- */
function exportExcel(m,rows){
  const headers=m.cols.map(c=>c[1]);
  const body=rows.map(r=>m.cols.map(c=>rawCell(r,c)));
  const ws=XLSX.utils.aoa_to_sheet([headers,...body]);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,m.label.slice(0,31));
  XLSX.writeFile(wb, m.table+".xlsx");
}
function exportPDF(m,rows){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"landscape"});
  doc.setFontSize(14); doc.text(m.title,14,15);
  doc.setFontSize(9); doc.setTextColor(120);
  doc.text("Generado "+new Date().toLocaleString("es"),14,21);
  doc.autoTable({
    startY:26,
    head:[m.cols.map(c=>c[1])],
    body:rows.map(r=>m.cols.map(c=>rawCell(r,c))),
    styles:{fontSize:8,cellPadding:3},
    headStyles:{fillColor:[14,165,233]},
  });
  doc.save(m.table+".pdf");
}

/* ---------- página de módulo ---------- */
function ModulePage({mkey,perm,onChange}){
  const m=MODULES[mkey];
  const {rows,loading,err,load}=useTable(m.table,onChange);
  const [q,setQ]=useState("");
  const [modal,setModal]=useState(null);

  const filtered=useMemo(()=>{
    if(!q.trim()) return rows;
    const s=q.toLowerCase();
    return rows.filter(r=> m.search.some(f=> String(r[f]||"").toLowerCase().includes(s)));
  },[rows,q]);

  async function save(obj){
    const payload={...obj}; delete payload.id; delete payload.created_at;
    if(obj.id) await db.from(m.table).update(payload).eq("id",obj.id);
    else await db.from(m.table).insert(payload);
    setModal(null); load();
  }
  async function remove(id){
    if(!confirm("¿Eliminar este registro?")) return;
    await db.from(m.table).delete().eq("id",id); load();
  }
  async function aprobar(r,estado){
    await db.from(m.table).update({estado}).eq("id",r.id); load();
  }

  const canApprove = mkey==="leaves" && perm.del;   // Administrador y Líder
  const showActions = perm.edit || perm.del || canApprove;
  return (
    <div>
      <h1 className="page-title">{m.title}</h1>

      {err && <div className="banner">Error: {err}</div>}
      {mkey==="courses" && <CourseRanking rows={rows}/>}

        <input className="search" placeholder="Buscar…" value={q} onChange={e=>setQ(e.target.value)}/>
        <div style={{display:"flex",gap:8}}>
          <button className="btn ghost sm" onClick={()=>exportExcel(m,filtered)}>Excel</button>
          <button className="btn ghost sm" onClick={()=>exportPDF(m,filtered)}>PDF</button>
          {perm.create && <button className="btn" onClick={()=>setModal({})}><Icon d={I.plus} size={16}/> Agregar</button>}
        </div>
      </div>
      <div className="card" style={{padding:0,overflow:"hidden"}}>
        {loading ? <div className="empty">Cargando…</div> :
         filtered.length===0 ? <div className="empty">Sin registros.</div> :
        <table>
          <thead><tr>{m.cols.map(c=><th key={c[0]}>{c[1]}</th>)}{showActions&&<th></th>}</tr></thead>
          <tbody>
            {filtered.map(r=>(
              <tr key={r.id} onDoubleClick={()=>perm.edit&&setModal(r)} style={{cursor:perm.edit?"pointer":"default"}}>
                {m.cols.map(c=><td key={c[0]}>{fmt(r[c[0]],c[2])}</td>)}
                {showActions && <td style={{textAlign:"right",whiteSpace:"nowrap"}}>
                  {canApprove && r.estado==="Pendiente" && <>
                    <button className="btn sm" style={{background:"var(--green)",marginRight:6}} onClick={()=>aprobar(r,"Aprobado")}>Aprobar</button>
                    <button className="btn sm" style={{background:"var(--red)",color:"#fff",marginRight:6}} onClick={()=>aprobar(r,"Rechazado")}>Rechazar</button>
                  </>}
                  {perm.edit && <button className="btn ghost" style={{padding:"5px 9px",marginRight:6}} onClick={()=>setModal(r)}>Editar</button>}
                  {perm.del && <button className="btn danger" onClick={()=>remove(r.id)}><Icon d={I.trash} size={16}/></button>}
                </td>}
              </tr>
            ))}
          </tbody>
        </table>}
      </div>
      {modal!==null && <FormModal m={m} record={modal} onClose={()=>setModal(null)} onSave={save}/>}
    </div>
  );
}

/* ---------- modal ---------- */
function FormModal({m,record,onClose,onSave}){
  const [form,setForm]=useState(()=>{ const o={...record}; m.fields.forEach(f=>{ if(o[f[0]]===undefined) o[f[0]]=""; }); return o; });
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  function submit(e){ e.preventDefault(); const clean={...form}; m.fields.forEach(f=>{ if(clean[f[0]]==="") clean[f[0]]=null; }); onSave(clean); }
  return (
    <div className="modal-bg" onClick={onClose}>
      <form className="modal" onClick={e=>e.stopPropagation()} onSubmit={submit}>
        <h3>{record.id?"Editar":"Nuevo"} — {m.label}</h3>
        {m.fields.map(([key,label,type,req,opts])=>(
          <div className="field" key={key}>
            <label>{label}{req?" *":""}</label>
            {type==="select" ?
              <select value={form[key]||""} onChange={e=>set(key,e.target.value)} required={req}>
                <option value="">Selecciona…</option>
                {opts.map(o=><option key={o} value={o}>{o}</option>)}
              </select>
            : type==="textarea" ?
              <textarea rows="3" value={form[key]||""} onChange={e=>set(key,e.target.value)}/>
            :
              <input type={type} value={form[key]||""} onChange={e=>set(key,e.target.value)} required={req}/>
            }
          </div>
        ))}
        <div className="modal-actions">
          <button type="button" className="btn ghost" onClick={onClose}>Cancelar</button>
          <button type="submit" className="btn">Guardar</button>
        </div>
      </form>
    </div>
  );
}

/* ---------- Rol de guardias (rotación) ---------- */
function GuardRoster({perm,onChange}){
  const [rows,setRows] = useState(null);
  const [err,setErr] = useState(null);
  async function load(){
    const {data,error} = await db.from("guard_roster").select("*").order("orden",{ascending:true});
    if(error) setErr(error.message); else { setRows(data||[]); setErr(null); }
  }
  useEffect(()=>{ load(); },[]);
  const turnos = ["Cambios nocturnos","Guardia matutina"];
  function nextId(list){
    if(!list.length) return null;
    return [...list].sort((a,b)=> (a.veces-b.veces) || (a.orden-b.orden))[0].id;
  }
  async function registrar(r){
    await db.from("guard_roster").update({veces:(r.veces||0)+1, ultima_guardia:new Date().toISOString().slice(0,10)}).eq("id",r.id);
    load(); onChange&&onChange();
  }
  async function reiniciar(turno){
    if(!confirm("¿Reiniciar la rotación de "+turno+"? Pone los contadores en cero.")) return;
    const ids = rows.filter(x=>x.turno===turno).map(x=>x.id);
    if(ids.length) await db.from("guard_roster").update({veces:0,ultima_guardia:null}).in("id",ids);
    load();
  }
  if(rows===null) return <div><h1 className="page-title">Rol de guardias</h1><p className="page-sub">Cargando…</p></div>;
  return (
    <div>
      <h1 className="page-title">Rol de guardias</h1>
      <p className="page-sub">Rotación de cambios tomada del Excel. La persona en verde es <b>quién sigue</b>; al registrar un cambio pasa el turno al siguiente.</p>
      {err && <div className="banner">Error: {err}</div>}
      <div className="grid" style={{gridTemplateColumns:"1fr 1fr"}}>
        {turnos.map(t=>{
          const list = rows.filter(r=>r.turno===t).sort((a,b)=>a.orden-b.orden);
          const nid = nextId(list);
          return (
            <div className="card" key={t} style={{padding:0,overflow:"hidden"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px",borderBottom:"1px solid var(--line)"}}>
                <h3 style={{margin:0}}>{t}</h3>
                {perm.del && <button className="btn ghost sm" onClick={()=>reiniciar(t)}>Reiniciar</button>}
              </div>
              {list.length===0 ? <div className="empty">Sin personas.</div> :
              <table>
                <thead><tr><th>#</th><th>Persona</th><th>Última</th><th>Veces</th><th></th></tr></thead>
                <tbody>
                  {list.map(r=>(
                    <tr key={r.id} style={r.id===nid?{background:HEX.green+"1f"}:null}>
                      <td>{r.orden}</td>
                      <td>
                        {r.id===nid && <span className="pill" style={{background:HEX.green+"22",color:HEX.green,marginRight:6}}>sigue</span>}
                        {r.persona}
                      </td>
                      <td>{r.ultima_guardia ? new Date(r.ultima_guardia).toLocaleDateString("es") : "—"}</td>
                      <td>{r.veces||0}</td>
                      <td style={{textAlign:"right"}}>
                        {perm.edit && r.id===nid && <button className="btn sm" onClick={()=>registrar(r)}>Registrar cambio</button>}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ---------- ranking de cursos ---------- */
function CourseRanking({rows}){
  const rank = useMemo(()=>{
    const m={};
    rows.forEach(r=>{ const k=(r.curso||"").trim(); if(k) m[k]=(m[k]||0)+1; });
    return Object.entries(m).sort((a,b)=> b[1]-a[1]);
  },[rows]);
  if(rank.length===0) return null;
  const max = rank[0][1];
  return (
    <div className="card" style={{marginBottom:16}}>
      <h3 style={{marginTop:0}}>Ranking de cursos <span className="page-sub" style={{fontSize:13}}>· {rows.length} inscripciones · {rank.length} cursos</span></h3>
      {rank.map(([c,n],i)=>(
        <div key={c} style={{display:"flex",alignItems:"center",gap:10,margin:"7px 0"}}>
          <div style={{width:22,color:"var(--muted)",fontSize:13,textAlign:"right"}}>{i+1}</div>
          <div style={{flex:1}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}}><span>{c}</span><b>{n}</b></div>
            <div style={{height:8,background:"var(--panel2)",borderRadius:5,overflow:"hidden"}}>
              <div style={{height:"100%",width:(n/max*100)+"%",background:"var(--accent2)"}}></div>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ---------- dashboard ---------- */
function Dashboard({data,go}){
  if(!data) return (<div><h1 className="page-title">Dashboard</h1><p className="page-sub">Cargando…</p></div>);
  const today=startToday();
  const activos=data.team.filter(p=>p.estado==="Activo").length;
  const ausenciasCurso=data.leaves.filter(l=>{ const i=pd(l.fecha_inicio),f=pd(l.fecha_fin); return i&&f&&i<=today&&f>=today&&l.estado!=="Rechazado"; }).length;
  const guardiasAsign=data.guards.length;
  const ventanasProx=data.windows.filter(w=>w.fecha_hora&&new Date(w.fecha_hora)>=today&&w.estado!=="Cancelada").length;

  const eventos=[];
  data.windows.forEach(w=>{ if(w.fecha_hora) eventos.push({fecha:new Date(w.fecha_hora),tipo:"Ventana",txt:w.sistema,estado:w.estado}); });
  data.guards.forEach(g=>{ const f=pd(g.fecha_inicio); if(f) eventos.push({fecha:f,tipo:"Guardia",txt:`${g.persona} · ${g.tipo||""}`,estado:""}); });
  const proximos=eventos.filter(e=>e.fecha>=today).sort((a,b)=>a.fecha-b.fecha).slice(0,6);

  const alertas=[];
  computeConflicts(data).forEach(c=>alertas.push(["red",`Choque de agenda: ${c.persona} (${c.date.toLocaleDateString("es",{day:"numeric",month:"short"})})`]));
  data.windows.filter(w=>w.estado==="En ejecución").forEach(w=>alertas.push(["amber",`Ventana en ejecución: ${w.sistema}`]));
  data.leaves.filter(l=>l.estado==="Pendiente").forEach(l=>alertas.push(["amber",`Permiso pendiente: ${l.persona}`]));
  data.rollbacks.filter(r=>r.estado==="Fallido").forEach(r=>alertas.push(["red",`Reverso fallido: ${r.release}`]));

  const kpis=[
    ["Personal activo",activos,I.team,"team"],
    ["Ausencias en curso",ausenciasCurso,I.leave,"leaves"],
    ["Guardias asignadas",guardiasAsign,I.guard,"guards"],
    ["Ventanas próximas",ventanasProx,I.wind,"windows"],
  ];
  return (
    <div>
      <h1 className="page-title">Dashboard</h1>
      <p className="page-sub">Vista general del equipo · {today.toLocaleDateString("es",{dateStyle:"full"})}</p>
      <div className="grid kpis" style={{marginBottom:18}}>
        {kpis.map(([l,n,ic,k])=>(
          <div className="card kpi" key={l} style={{cursor:"pointer"}} onClick={()=>go(k)}>
            <span className="ico"><Icon d={ic} size={22}/></span>
            <div className="n">{n}</div><div className="l">{l}</div>
          </div>
        ))}
      </div>
      <div className="grid" style={{gridTemplateColumns:"1fr 1fr"}}>
        <div className="card">
          <h3 style={{marginTop:0}}>Próximos eventos</h3>
          {proximos.length===0 ? <p className="page-sub">No hay eventos próximos.</p> :
            proximos.map((e,i)=>(
              <div className="alert-row" key={i}>
                <span className="dot" style={{background:e.tipo==="Ventana"?C.accent:C.violet}}></span>
                <div>
                  <div>{e.tipo}: <b>{e.txt}</b> {e.estado&&<Pill v={e.estado}/>}</div>
                  <div className="page-sub" style={{margin:0}}>{e.fecha.toLocaleDateString("es",{dateStyle:"medium"})}</div>
                </div>
              </div>
            ))}
        </div>
        <div className="card">
          <h3 style={{marginTop:0}}><Icon d={I.bell} size={16}/> Alertas</h3>
          {alertas.length===0 ? <p className="page-sub">Todo en orden, sin alertas.</p> :
            alertas.slice(0,8).map(([c,t],i)=>(
              <div className="alert-row" key={i}><span className="dot" style={{background:C[c]}}></span><div>{t}</div></div>
            ))}
        </div>
      </div>
    </div>
  );
}

/* ---------- calendario ---------- */
function Calendar({data}){
  const [cursor,setCursor]=useState(()=>{ const t=new Date(); return new Date(t.getFullYear(),t.getMonth(),1); });
  const byDay=useMemo(()=>{
    const map={};
    const push=(d,ev)=>{ const k=dkey(d); (map[k]=map[k]||[]).push(ev); };
    if(data){
      data.leaves.forEach(l=>{ if(l.estado==="Rechazado")return; const a=pd(l.fecha_inicio),b=pd(l.fecha_fin)||a; if(!a)return; let d=new Date(a),i=0; while(d<=b&&i<400){ push(new Date(d),{color:"amber",label:`${l.persona} · ${l.tipo||"Permiso"}`,persona:l.persona,kind:"leave"}); d.setDate(d.getDate()+1);i++; } });
      data.guards.forEach(g=>{ const a=pd(g.fecha_inicio),b=pd(g.fecha_fin)||a; if(!a)return; let d=new Date(a),i=0; while(d<=b&&i<400){ push(new Date(d),{color:"violet",label:`${g.persona} · ${g.tipo||"Guardia"}`,persona:g.persona,kind:"guard"}); d.setDate(d.getDate()+1);i++; } });
      data.windows.forEach(w=>{ if(!w.fecha_hora||w.estado==="Cancelada")return; push(new Date(w.fecha_hora),{color:"accent",label:`${w.sistema}`,kind:"window"}); });
    }
    // marcar choques
    Object.values(map).forEach(evs=>{
      const personas={};
      evs.forEach(e=>{ if(e.persona){ personas[e.persona]=personas[e.persona]||{}; personas[e.persona][e.kind]=true; } });
      evs.forEach(e=>{ if(e.persona && personas[e.persona].leave && personas[e.persona].guard) e.conflict=true; });
    });
    return map;
  },[data]);

  const y=cursor.getFullYear(), mo=cursor.getMonth();
  const first=new Date(y,mo,1);
  const startDow=(first.getDay()+6)%7; // lunes=0
  const daysInMonth=new Date(y,mo+1,0).getDate();
  const todayK=dkey(startToday());
  const cells=[];
  for(let i=0;i<startDow;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(new Date(y,mo,d));
  while(cells.length%7!==0) cells.push(null);

  const dows=["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
  return (
    <div>
      <h1 className="page-title">Calendario</h1>
      <p className="page-sub">Guardias, ventanas y permisos en una sola vista. Los choques de agenda se marcan en rojo.</p>
      <div className="cal-bar">
        <button className="btn ghost sm" onClick={()=>setCursor(new Date(y,mo-1,1))}><Icon d={I.left} size={16}/></button>
        <h2>{cursor.toLocaleDateString("es",{month:"long",year:"numeric"})}</h2>
        <button className="btn ghost sm" onClick={()=>setCursor(new Date(y,mo+1,1))}><Icon d={I.right} size={16}/></button>
        <button className="btn ghost sm" onClick={()=>{const t=new Date();setCursor(new Date(t.getFullYear(),t.getMonth(),1));}}>Hoy</button>
      </div>
      <div className="card">
        <div className="cal-head">{dows.map(d=><div key={d}>{d}</div>)}</div>
        <div className="cal-grid">
          {cells.map((d,i)=>{
            if(!d) return <div key={i} className="cal-cell off"></div>;
            const k=dkey(d); const evs=byDay[k]||[];
            return (
              <div key={i} className={"cal-cell"+(k===todayK?" today":"")}>
                <div className="cal-day">{d.getDate()}</div>
                {evs.slice(0,4).map((e,j)=>(
                  <div key={j} className={"cal-ev"+(e.conflict?" conflict":"")} style={{background:HEX[e.color]}} title={e.label}>{e.label}</div>
                ))}
                {evs.length>4 && <div className="page-sub" style={{margin:0,fontSize:11}}>+{evs.length-4} más</div>}
              </div>
            );
          })}
        </div>
        <div className="legend">
          <span><i style={{background:HEX.violet}}></i> Guardia</span>
          <span><i style={{background:HEX.accent}}></i> Ventana</span>
          <span><i style={{background:HEX.amber}}></i> Permiso</span>
          <span><i style={{background:HEX.red,width:10,height:10,border:"2px solid "+HEX.red,background:"transparent"}}></i> Choque de agenda</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
