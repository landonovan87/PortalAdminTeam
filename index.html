/* ---------- utilidades de fecha ---------- */
function pd(s){ if(!s) return null; const p=String(s).slice(0,10).split("-").map(Number); return new Date(p[0],p[1]-1,p[2],12,0,0); }
function dkey(d){ return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
function startToday(){ const t=new Date(); return new Date(t.getFullYear(),t.getMonth(),t.getDate(),12,0,0); }
function fmt(val,kind){
  if(val===null||val===undefined||val==="") return "—";
  if(kind==="pill") return <Pill v={val}/>;
  if(kind==="dt"){ try{return new Date(val).toLocaleString("es",{dateStyle:"medium",timeStyle:"short"});}catch{return val;} }
  return String(val);
}
function rawCell(r,col){
  const v=r[col[0]];
  if(v===null||v===undefined) return "";
  if(col[2]==="dt"){ try{return new Date(v).toLocaleString("es");}catch{return String(v);} }
  return String(v);
}

/* ---------- choques de agenda ---------- */
function computeConflicts(data){
  if(!data) return [];
  const byPerson = {}; // persona -> {leave:Set, guard:Set}
  const addDays=(persona,startS,endS,kind)=>{
    const a=pd(startS), b=pd(endS)||pd(startS);
    if(!a) return;
    byPerson[persona]=byPerson[persona]||{leave:new Set(),guard:new Set()};
    let d=new Date(a), i=0;
    while(d<=b && i<400){ byPerson[persona][kind].add(dkey(d)); d.setDate(d.getDate()+1); i++; }
  };
  data.leaves.forEach(l=> l.persona && l.estado!=="Rechazado" && addDays(l.persona,l.fecha_inicio,l.fecha_fin,"leave"));
  data.guards.forEach(g=> g.persona && addDays(g.persona,g.fecha_inicio,g.fecha_fin,"guard"));
  const out=[];
  Object.entries(byPerson).forEach(([persona,o])=>{
    o.guard.forEach(k=>{ if(o.leave.has(k)){ const p=k.split("-").map(Number); out.push({date:new Date(p[0],p[1]-1,p[2]),persona}); } });
  });
  return out.sort((a,b)=>a.date-b.date);
}

/* ---------- notificaciones ---------- */
function buildNotifs(data){
  if(!data) return [];
  const today=startToday(); const in7=new Date(today); in7.setDate(in7.getDate()+7);
  const n=[];
  data.windows.forEach(w=>{ const f=w.fecha_hora&&new Date(w.fecha_hora); if(f&&f>=today&&f<=in7&&w.estado!=="Cancelada") n.push(["accent",`Ventana próxima: ${w.sistema} (${f.toLocaleDateString("es",{day:"numeric",month:"short"})})`]); });
  data.guards.forEach(g=>{ const f=pd(g.fecha_inicio); if(f&&f>=today&&f<=in7) n.push(["violet",`Guardia próxima: ${g.persona} · ${g.tipo||""}`]); });
  data.windows.filter(w=>w.estado==="En ejecución").forEach(w=>n.push(["amber",`Ventana en ejecución: ${w.sistema}`]));
  data.leaves.filter(l=>l.estado==="Pendiente").forEach(l=>n.push(["amber",`Permiso pendiente: ${l.persona}`]));
  data.rollbacks.filter(r=>r.estado==="En proceso").forEach(r=>n.push(["amber",`Reverso en proceso: ${r.release}`]));
  data.rollbacks.filter(r=>r.estado==="Fallido").forEach(r=>n.push(["red",`Reverso fallido: ${r.release}`]));
  computeConflicts(data).forEach(c=>n.push(["red",`⚠ Choque de agenda: ${c.persona} (${c.date.toLocaleDateString("es",{day:"numeric",month:"short"})})`]));
  const rank={red:0,amber:1,violet:2,accent:3};
  return n.sort((a,b)=>rank[a[0]]-rank[b[0]]);
}

function App(){
  if(!CONFIGURED) return <SetupScreen/>;
  const [session,setSession] = useState(undefined);   // undefined=cargando, null=sin sesión
  const [role,setRole] = useState(null);
  const [roleLoading,setRoleLoading] = useState(false);
  const [recovery,setRecovery] = useState(false);

  useEffect(()=>{
    db.auth.getSession().then(({data})=>setSession(data.session||null));
    const {data:sub} = db.auth.onAuthStateChange((event,s)=>{
      setSession(s||null);
      if(event==="PASSWORD_RECOVERY") setRecovery(true);
    });
    return ()=> sub.subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    let alive=true;
    if(session && session.user){
      setRoleLoading(true);
      db.from("profiles").select("role").eq("id",session.user.id).single()
        .then(({data})=>{ if(!alive) return; setRole(data && data.role ? data.role : "Solo lectura"); setRoleLoading(false); });
    } else { setRole(null); }
    return ()=>{ alive=false; };
  },[session]);

  if(session===undefined) return <Splash text="Cargando…"/>;
  if(recovery && session) return <SetNewPassword onDone={()=>setRecovery(false)}/>;
  if(!session) return <Login/>;
  if(roleLoading || !role) return <Splash text="Cargando perfil…"/>;
  return <Shell role={role} email={session.user.email} onLogout={()=>db.auth.signOut()}/>;
}

function Shell({role,email,onLogout}){

    <div className="layout">
      <aside className="sidebar">
        <div className="brand"><Icon d={I.dash} size={22}/> <div>Ops Team Hub<small>Gestión de equipo TI</small></div></div>
        {navItems.map(([k,l,ic])=>(
          <button key={k} className={"nav-btn"+(view===k?" active":"")} onClick={()=>setView(k)}>
            <Icon d={ic}/> {l}
          </button>
        ))}
      </aside>
      <main className="main">
        <div className="topbar">
          <NotifBell data={data}/>
          <span className="role-chip" title={email}>{email} · <b>{role}</b></span>
          <button className="btn ghost sm" onClick={onLogout}><Icon d={I.out} size={15}/> Salir</button>
        </div>
        {err && <div className="banner">Error al conectar con Supabase: {err}</div>}
        {view==="dashboard" ? <Dashboard data={data} go={setView} onRefresh={bump} role={role}/> :
         view==="calendar"  ? <Calendar data={data}/> :
         view==="roster"    ? <GuardRoster perm={perm} onChange={bump} data={data} currentUserEmail={email} role={role}/> :
         view==="users"     ? <UsersPage/> :
         <ModulePage key={view} mkey={view} perm={perm} onChange={bump} data={data} currentUserEmail={email} role={role}/>}

  );
}

/* ---------- login (Supabase Auth) ---------- */
function Login(){
  const [mode,setMode] = useState("in");   // in = iniciar sesión, up = registrarse, activate = activar cuenta
  const [email,setEmail] = useState("");
  const [pw,setPw] = useState("");
  const [busy,setBusy] = useState(false);
  const [msg,setMsg] = useState(null);     // {t:"err"|"ok", m:string}

  // Estados específicos para el flujo de activación
  const [step,setStep] = useState(1);       // 1 = ingresar num empleado, 2 = capturar correo/pass
  const [empNum,setEmpNum] = useState("");
  const [empName,setEmpName] = useState("");
  const [hasEmail,setHasEmail] = useState(false);
  const [hasPhone,setHasPhone] = useState(false);
  const [phone,setPhone] = useState("");
  const [repeatPw,setRepeatPw] = useState("");

  async function submit(e){
    e.preventDefault(); setBusy(true); setMsg(null);
    if(mode==="in"){
      const {error} = await db.auth.signInWithPassword({email:email.trim(), password:pw});
      if(error) setMsg({t:"err", m:error.message});
    } else {
      const {error} = await db.auth.signUp({email:email.trim(), password:pw});
      if(error) setMsg({t:"err", m:error.message});
      else setMsg({t:"ok", m:"Cuenta creada. Si el proyecto pide confirmación, revisa tu correo. Después, un administrador debe asignarte un rol."});
    }
    setBusy(false);
  }

  async function handleVerify(e){
    e.preventDefault();
    if(!empNum.trim()){
      setMsg({t:"err", m:"Por favor ingresa tu número de empleado."});
      return;
    }
    setBusy(true); setMsg(null);
    try {
      const { data, error } = await db.rpc("verify_employee", { emp_num: empNum.trim() });
      if (error) throw error;
      if (!data || data.length === 0) {
        setMsg({t:"err", m:"No se encontró ningún empleado activo con ese número."});
      } else {
        const emp = data[0];
        setEmpName(emp.nombre);
        setHasEmail(emp.has_email);
        setEmail(emp.correo || "");
        const phoneVal = emp.telefono || "";
        setPhone(phoneVal);
        setHasPhone(phoneVal.trim() !== "");
        setStep(2);
      }
    } catch (err) {
      setMsg({t:"err", m:err.message || "Error al verificar el número de empleado."});
    } finally {
      setBusy(false);
    }
  }

  async function handleActivate(e){
    e.preventDefault();
    const cleanEmail = email.trim();
    const cleanPhone = phone.trim();
    if(!cleanEmail){
      setMsg({t:"err", m:"El correo electrónico es obligatorio."});
      return;
    }
    if(!hasPhone && !cleanPhone){
      setMsg({t:"err", m:"El número de teléfono es obligatorio."});
      return;
    }
    if(pw.length < 6){
      setMsg({t:"err", m:"La contraseña debe tener al menos 6 caracteres."});
      return;
    }
    if(pw !== repeatPw){
      setMsg({t:"err", m:"Las contraseñas no coinciden."});
      return;
    }

    setBusy(true); setMsg(null);
    try {
      // 1) Si no tiene correo o teléfono en la base de datos de team, lo actualizamos vía RPC
      if(!hasEmail || !hasPhone){
        const { data: updated, error: updateErr } = await db.rpc("activate_employee_email", { 
          emp_num: empNum.trim(), 
          emp_email: cleanEmail,
          emp_phone: hasPhone ? null : cleanPhone
        });
        if (updateErr) throw updateErr;
        if (!updated) {
          throw new Error("No se pudo asociar la información a tu número de empleado.");
        }
      }

      // 2) Registrar en Supabase Auth
      const { error: signUpErr } = await db.auth.signUp({ email: cleanEmail, password: pw });
      if (signUpErr) throw signUpErr;

      setMsg({
        t: "ok", 
        m: "¡Cuenta activada con éxito! Revisa tu correo si se requiere confirmación. Ahora puedes iniciar sesión con tu correo y contraseña."
      });
      // Limpiar estados y regresar al login
      setMode("in");
      setStep(1);
      setEmpNum("");
      setPw("");
      setRepeatPw("");
    } catch (err) {
      setMsg({t:"err", m:err.message || "Error durante la activación de la cuenta."});
    } finally {
      setBusy(false);
    }
  }

  async function forgot(){
    if(!email.trim()){ setMsg({t:"err", m:"Escribe tu correo arriba y vuelve a pulsar “¿Olvidaste tu contraseña?”."}); return; }
    setBusy(true); setMsg(null);
    const {error} = await db.auth.resetPasswordForEmail(email.trim(), {redirectTo: window.location.href});
    setBusy(false);
    setMsg(error ? {t:"err", m:error.message} : {t:"ok", m:"Te enviamos un correo para restablecer tu contraseña. Ábrelo y vuelve a este portal."});
  }

  return (
    <div className="main"><div className="login-wrap">
      <div className="card">
        <div className="brand" style={{justifyContent:"center"}}><Icon d={I.dash} size={24}/> Ops Team Hub</div>
        
        {mode === "activate" ? (
          <div>
            <p className="page-sub" style={{margin:"0 0 18px"}}>Activa tu cuenta</p>
            {step === 1 ? (
              <form onSubmit={handleVerify}>
                <p style={{fontSize:13, color:"var(--muted)", margin:"0 0 14px"}}>
                  Ingresa tu número de empleado para verificar tu registro en el equipo.
                </p>
                <div className="field" style={{textAlign:"left"}}>
                  <label>Número de Empleado</label>
                  <input type="text" value={empNum} onChange={e=>setEmpNum(e.target.value)} placeholder="Ej. 1089348" autoFocus required/>
                </div>
                {msg && <p style={{color:msg.t==="err"?"var(--red)":"var(--green)",fontSize:13,margin:"0 0 12px"}}>{msg.m}</p>}
                <button className="btn" style={{width:"100%",justifyContent:"center"}} type="submit" disabled={busy}>
                  {busy ? "Verificando…" : "Verificar Empleado"}
                </button>
              </form>
            ) : (
              <form onSubmit={handleActivate}>
                <div style={{background:"var(--panel2)", padding:"10px 14px", borderRadius:8, border:"1px solid var(--line)", margin:"0 0 14px", textAlign:"left"}}>
                  <p style={{fontSize:12, color:"var(--muted)", margin:0}}>Empleado identificado</p>
                  <p style={{fontSize:14, fontWeight:600, color:"var(--text)", margin:"2px 0 0"}}>{empName}</p>
                  <p style={{fontSize:11, color:"var(--muted)", margin:"2px 0 0"}}>Número: {empNum}</p>
                </div>

                <div className="field" style={{textAlign:"left"}}>
                  <label>Correo Electrónico</label>
                  <input 
                    type="email" 
                    value={email} 
                    onChange={e=>setEmail(e.target.value)} 
                    placeholder="correo@empresa.com" 
                    required 
                    disabled={hasEmail}
                    style={hasEmail ? {background:"var(--panel2)", color:"var(--muted)", cursor:"not-allowed"} : {}}
                  />
                  {!hasEmail && (
                    <small style={{fontSize:11, color:"var(--muted)", marginTop:4, display:"block"}}>
                      No tienes un correo registrado. Ingresa el correo con el que deseas acceder.
                    </small>
                  )}
                </div>

                <div className="field" style={{textAlign:"left"}}>
                  <label>Teléfono <span style={{color:"var(--red)"}}>*</span></label>
                  <input 
                    type="text" 
                    value={phone} 
                    onChange={e=>setPhone(e.target.value)} 
                    placeholder="Ej. 5512345678" 
                    required 
                    disabled={hasPhone}
                    style={hasPhone ? {background:"var(--panel2)", color:"var(--muted)", cursor:"not-allowed"} : {}}
                  />
                  {!hasPhone && (
                    <small style={{fontSize:11, color:"var(--muted)", marginTop:4, display:"block"}}>
                      No tienes un teléfono registrado. Es obligatorio para recibir avisos y autorizaciones en tu cel.
                    </small>
                  )}
                </div>

                <div className="field" style={{textAlign:"left"}}>
                  <label>Contraseña</label>
                  <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••" required minLength={6}/>
                </div>

                <div className="field" style={{textAlign:"left"}}>
                  <label>Confirmar Contraseña</label>
                  <input type="password" value={repeatPw} onChange={e=>setRepeatPw(e.target.value)} placeholder="••••••••" required minLength={6}/>
                </div>

                {msg && <p style={{color:msg.t==="err"?"var(--red)":"var(--green)",fontSize:13,margin:"0 0 12px"}}>{msg.m}</p>}
                
                <button className="btn" style={{width:"100%",justifyContent:"center"}} type="submit" disabled={busy}>
                  {busy ? "Activando…" : "Activar Cuenta y Entrar"}
                </button>
                
                <p style={{margin:"12px 0 0",fontSize:13}}>
                  <a href="#" onClick={e=>{e.preventDefault();setStep(1);setMsg(null);}} style={{color:"var(--muted)"}}>← Cambiar número de empleado</a>
                </p>
              </form>
            )}
          </div>
        ) : (
          <div>
            <p className="page-sub" style={{margin:"0 0 18px"}}>{mode==="in"?"Inicia sesión":"Crea tu cuenta"}</p>
            <form onSubmit={submit}>
              <div className="field" style={{textAlign:"left"}}>
                <label>Correo</label>
                <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="correo@empresa.com" autoFocus required/>
              </div>
              <div className="field" style={{textAlign:"left"}}>
                <label>Contraseña</label>
                <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••" required/>
              </div>
              {msg && <p style={{color:msg.t==="err"?"var(--red)":"var(--green)",fontSize:13,margin:"0 0 12px"}}>{msg.m}</p>}
              <button className="btn" style={{width:"100%",justifyContent:"center"}} type="submit" disabled={busy}>
                {busy ? "…" : (mode==="in" ? "Entrar" : "Registrarme")}
              </button>
            </form>
            
            {mode==="in" && <p style={{margin:"12px 0 0",fontSize:13}}>
              <a href="#" onClick={e=>{e.preventDefault();forgot();}} style={{color:"var(--muted)"}}>¿Olvidaste tu contraseña?</a>
            </p>}
          </div>
        )}

        <div style={{marginTop:18, borderTop:"1px solid var(--line)", paddingTop:12}}>
          {mode === "in" ? (
            <p className="page-sub" style={{margin:0,fontSize:13}}>
              ¿Eres nuevo en el equipo? <a href="#" onClick={e=>{e.preventDefault();setMsg(null);setMode("activate");setStep(1);}} style={{color:"var(--accent)",fontWeight:600}}>Activa tu cuenta aquí</a>
            </p>
          ) : (
            <p className="page-sub" style={{margin:0,fontSize:13}}>
              ¿Ya tienes cuenta activa? <a href="#" onClick={e=>{e.preventDefault();setMsg(null);setMode("in");}} style={{color:"var(--accent)",fontWeight:600}}>Inicia sesión</a>
            </p>
          )}
        </div>
      </div>
    </div></div>
  );
}

/* ---------- hooks de datos ---------- */
function useAllData(key){
  const [data,setData] = useState(null);
  const [err,setErr] = useState(null);
  useEffect(()=>{ let alive=true; (async()=>{
    try{
      const tables=["team","leaves","guards","windows","courses","rollbacks","mdc_changes"];
      const res=await Promise.all(tables.map(t=>db.from(t).select("*")));
      if(!alive) return;
      const obj={}; tables.forEach((t,i)=> obj[t]=res[i].data||[]);
      const e=res.find(r=>r.error); if(e) setErr(e.error.message); else setErr(null);
      setData(obj);
    }catch(e){ if(alive) setErr(e.message); }
  })(); return ()=>{alive=false;}; },[key]);
  return {data,err};
}
function useTable(table,onChange){
  const [rows,setRows]=useState([]); const [loading,setLoading]=useState(true); const [err,setErr]=useState(null);
  async function load(){
    setLoading(true);
    const {data,error}=await db.from(table).select("*").order("created_at",{ascending:false});
    if(error) setErr(error.message); else { setRows(data||[]); setErr(null); }
    setLoading(false);
  }
  useEffect(()=>{ load(); },[table]);
  return {rows,loading,err,load:()=>{load(); onChange&&onChange();}};
}

function exportExcel(m,rows){
  const cols = m.table === "mdc_changes" ? MDC_EXCEL_COLS : m.cols;
  const headers=cols.map(c=>c[1]);
  const body=rows.map(r=>cols.map(c=>rawCell(r,c)));
  const ws=XLSX.utils.aoa_to_sheet([headers,...body]);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,m.label.slice(0,31));
  XLSX.writeFile(wb, m.table+".xlsx");
}
function exportPDF(m,rows){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"landscape"});
  doc.setFontSize(14); doc.text(m.title,14,15);
  doc.setFontSize(9); doc.setTextColor(120);
  doc.text("Generado "+new Date().toLocaleString("es"),14,21);
  doc.autoTable({
    startY:26,
    head:[m.cols.map(c=>c[1])],
    body:rows.map(r=>m.cols.map(c=>rawCell(r,c))),
    styles:{fontSize:8,cellPadding:3},
    headStyles:{fillColor:[14,165,233]},
  });
  doc.save(m.table+".pdf");
}

/* ---------- página de módulo ---------- */
function ModulePage({mkey,perm,onChange,data,currentUserEmail,role}){
  const m=MODULES[mkey];
  const {rows,loading,err,load}=useTable(m.table,onChange);
  const [q,setQ]=useState("");
  const [modal,setModal]=useState(null);

  const filtered=useMemo(()=>{
    if(!q.trim()) return rows;
    const s=q.toLowerCase();
    return rows.filter(r=> m.search.some(f=> String(r[f]||"").toLowerCase().includes(s)));
  },[rows,q]);

  async function save(obj){
    const payload={...obj}; delete payload.id; delete payload.created_at;
    const { error } = obj.id
      ? await db.from(m.table).update(payload).eq("id",obj.id)
      : await db.from(m.table).insert(payload);
    if(error) {
      alert("Error al guardar: " + error.message);
    } else {
      setModal(null); load();
    }
  }
  async function remove(id){
    if(!confirm("¿Eliminar este registro?")) return;
    const { error } = await db.from(m.table).delete().eq("id",id);
    if(error) {
      alert("Error al eliminar: " + error.message);
    } else {
      load();
    }
  }
  async function aprobar(r,estadoVal){
    const fieldName = m.table === "guards" ? "estado_reposicion" : "estado";
    const { error } = await db.from(m.table).update({[fieldName]: estadoVal}).eq("id",r.id);
    if(error) {
      alert("Error al actualizar estado: " + error.message);
    } else {
      load();
    }
  }

  const canApprove = (mkey==="leaves" || mkey==="guards") && perm.del;   // Administrador y Líder
  const showActions = perm.edit || perm.del || canApprove;
  return (
    <div>
      <h1 className="page-title">{m.title}</h1>
      <p className="page-sub">{m.sub}</p>
      {err && <div className="banner">Error: {err}</div>}
      {mkey==="courses" && <CourseRanking rows={rows}/>}
      {mkey==="rollbacks" && <RollbackRanking rows={rows}/>}
      <div className="section-h">
        <input className="search" placeholder="Buscar…" value={q} onChange={e=>setQ(e.target.value)}/>
        <div style={{display:"flex",gap:8}}>
          <button className="btn ghost sm" onClick={()=>exportExcel(m,filtered)}>Excel</button>
          <button className="btn ghost sm" onClick={()=>exportPDF(m,filtered)}>PDF</button>
          {perm.create && <button className="btn" onClick={()=>setModal({})}><Icon d={I.plus} size={16}/> Agregar</button>}
        </div>
      </div>
      <div className="card" style={{padding:0,overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
        {loading ? <div className="empty">Cargando…</div> :
         filtered.length===0 ? <div className="empty">Sin registros.</div> :
        <table style={{minWidth: `${m.cols.length * 115 + (showActions ? 130 : 0)}px`}}>
          <thead><tr>{m.cols.map(c=><th key={c[0]}>{c[1]}</th>)}{showActions&&<th></th>}</tr></thead>
          <tbody>
            {filtered.map(r=>{
              const rowCanApprove = (mkey==="leaves" && r.estado==="Pendiente" && perm.del) ||
                                    (mkey==="guards" && r.dia_reposicion && r.estado_reposicion==="Pendiente" && perm.del);
              return (
                <tr key={r.id} onDoubleClick={()=>perm.edit&&setModal(r)} style={{cursor:perm.edit?"pointer":"default"}}>
                  {m.cols.map(c=>{
                    let val = r[c[0]];
                    if (mkey === "guards" && c[0] === "estado_reposicion" && r.tipo !== "Guardia fin de semana") {
                      val = "No aplica";
                    }
                    return <td key={c[0]}>{fmt(val,c[2])}</td>;
                  })}
                  {showActions && <td style={{textAlign:"right",whiteSpace:"nowrap"}}>
                    {rowCanApprove && <>
                      <button className="btn sm" style={{background:"var(--green)",marginRight:6}} onClick={(e)=>{e.stopPropagation();aprobar(r,"Aprobado");}} onDoubleClick={(e)=>e.stopPropagation()}>Aprobar</button>
                      <button className="btn sm" style={{background:"var(--red)",color:"#fff",marginRight:6}} onClick={(e)=>{e.stopPropagation();aprobar(r,"Rechazado");}} onDoubleClick={(e)=>e.stopPropagation()}>Rechazar</button>
                    </>}
                    {perm.edit && <button className="btn ghost" style={{padding:"5px 9px",marginRight:6}} onClick={(e)=>{e.stopPropagation();setModal(r);}} onDoubleClick={(e)=>e.stopPropagation()}>Editar</button>}
                    {perm.del && <button className="btn danger" onClick={(e)=>{e.stopPropagation();remove(r.id);}} onDoubleClick={(e)=>e.stopPropagation()}><Icon d={I.trash} size={16}/></button>}
                  </td>}
                </tr>
              );
            })}
          </tbody>
        </table>}
      </div>
      {modal!==null && <FormModal m={m} record={modal} onClose={()=>setModal(null)} onSave={save} data={data} currentUserEmail={currentUserEmail} role={role}/>}
    </div>
  );
}

function FormModal({m,record,onClose,onSave,data,currentUserEmail,role}){
  const isMDC = m.table === "mdc_changes";
  
  const mdcFields = [
    "responsable_it", "celula_fabrica", "req", "ot", "folio_simba", "tipo_cambio", 
    "folio_hydra", "fecha", "responsable_cambio", "responsable_libera", "pais", 
    "descripcion", "justificacion", "el_cambio_es", "sucursales", "area_operaciones", 
    "devsecops", "esquema_rollback", "guardia_siguiente_nombre", "telefono_contacto", 
    "lugar_guardia", "estado", "responsable_reverso", "rancher"
  ];

  const [form,setForm]=useState(()=>{ 
    const o={...record}; 
    if (isMDC) {
      mdcFields.forEach(f => { 
        if(o[f]===undefined || o[f]===null) o[f]=""; 
      });
      if (!record.id) {
        o.responsable_it = "Jesus Orlando Munguia Garcia";
        o.celula_fabrica = "Medios de Disposición de Préstamo";
        o.lugar_guardia = "Torre 1 Piso 6";
        o.estado = "Por aplicar"; // Estado por defecto
      }
    } else {
      m.fields.forEach(f=>{ if(o[f[0]]===undefined) o[f[0]]=""; }); 
      if (!record.id) {
        if (m.table === "leaves") o.estado = "Pendiente";
        if (m.table === "guards") o.estado_reposicion = "Pendiente";
      }
    }
    return o; 
  });

  const set=(k,v)=>setForm(p=>({...p,[k]:v}));

  const teamList = useMemo(() => {
    if (!data || !data.team) return [];
    return data.team.filter(t => t.estado === "Activo").map(t => t.nombre).sort();
  }, [data]);

  const isDisabled = (key) => {
    const userRole = role;
    const isStaff = userRole === "Administrador" || userRole === "Líder";
    if (m.table === "leaves" && key === "estado") return !isStaff;
    if (m.table === "guards" && key === "estado_reposicion") return !isStaff;
    return false;
  };

  const handleGuardChange = (val) => {
    set("guardia_siguiente_nombre", val);
    if (data && data.team) {
      const guard = data.team.find(t => t.nombre === val);
      if (guard && guard.telefono) {
        set("telefono_contacto", guard.telefono);
      }
    }
  };

  function submit(e){ 
    e.preventDefault(); 
    const clean={...form}; 
    if (isMDC) {
      if (!clean.telefono_contacto || !clean.telefono_contacto.trim()) {
        alert("El campo 'Teléfono de contacto' es obligatorio.");
        return;
      }
      mdcFields.forEach(f=>{ if(clean[f]==="") clean[f]=null; }); 
      clean.sistema = clean.celula_fabrica || "Sistema Desconocido";
      clean.ticket = clean.folio_hydra || clean.folio_simba || clean.ot || clean.req || "";
    } else {
      m.fields.forEach(f=>{ if(clean[f[0]]==="") clean[f[0]]=null; }); 
      // Limpiar reposición si no es guardia de fin de semana
      if (m.table === "guards" && clean.tipo !== "Guardia fin de semana") {
        clean.dia_reposicion = null;
        clean.estado_reposicion = null;
      }
    }
    onSave(clean); 
  }

  if (isMDC) {
    return (
      <div className="modal-bg" onClick={onClose}>
        <form className="modal" style={{width:"860px", maxWidth:"95vw"}} onClick={e=>e.stopPropagation()} onSubmit={submit}>
          <h3 style={{borderBottom:"1px solid var(--line)",paddingBottom:10,marginBottom:16}}>
            {record.id ? "Editar" : "Nuevo"} — Mapeo de Cambios (MDC)
          </h3>
          
          <div style={{display:"grid", gridTemplateColumns:"1fr", gap:"16px", maxHeight:"70vh", overflow:"auto", paddingRight:8}}>
            
            {/* Grupo 1: Información de Control */}
            <div style={{borderBottom:"1px solid var(--line)", paddingBottom:14}}>
              <h4 style={{margin:"0 0 12px",color:"var(--accent)",fontSize:13,textTransform:"uppercase",letterSpacing:".05em"}}>1. Información de Control</h4>
              <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:"12px 16px"}}>
                <div className="field">
                  <label>Responsable del área IT</label>
                  <input type="text" value={form.responsable_it} onChange={e=>set("responsable_it",e.target.value)}/>
                </div>
                <div className="field">
                  <label>Nombre de la célula o fábrica</label>
                  <input type="text" value={form.celula_fabrica} onChange={e=>set("celula_fabrica",e.target.value)}/>
                </div>
                <div className="field">
                  <label>País</label>
                  <select value={form.pais} onChange={e=>set("pais",e.target.value)}>
                    <option value="">Selecciona…</option>
                    <option value="México">México</option>
                    <option value="LAM">LAM</option>
                  </select>
                </div>
                <div className="field">
                  <label>Rancher</label>
                  <select value={form.rancher} onChange={e=>set("rancher",e.target.value)}>
                    <option value="">Selecciona…</option>
                    <option value="Rancher Préstamo">Rancher Préstamo</option>
                    <option value="Rancher Medios De Disp">Rancher Medios De Disp</option>
                  </select>
                </div>
              </div>
            </div>

            {/* Grupo 2: Identificación del Cambio */}
            <div style={{borderBottom:"1px solid var(--line)", paddingBottom:14}}>
              <h4 style={{margin:"0 0 12px",color:"var(--accent)",fontSize:13,textTransform:"uppercase",letterSpacing:".05em"}}>2. Identificación del Cambio</h4>
              <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"12px 16px"}}>
                <div className="field">
                  <label>Req.</label>
                  <input type="text" value={form.req} onChange={e=>set("req",e.target.value)}/>
                </div>
                <div className="field">
                  <label>OT</label>
                  <input type="text" value={form.ot} onChange={e=>set("ot",e.target.value)}/>
                </div>
                <div className="field">
                  <label>Folio de SIMBA</label>
                  <input type="text" value={form.folio_simba} onChange={e=>set("folio_simba",e.target.value)}/>
                </div>
                <div className="field">
                  <label>Tipo de Cambio</label>
                  <select value={form.tipo_cambio} onChange={e=>set("tipo_cambio",e.target.value)}>
                    <option value="">Selecciona…</option>
                    <option value="Sistemas">Sistemas</option>
                    <option value="Negocio">Negocio</option>
                  </select>
                </div>
                <div className="field" style={{gridColumn:"span 2"}}>
                  <label>Folio del cambio Hydra</label>
                  <input type="text" value={form.folio_hydra} onChange={e=>set("folio_hydra",e.target.value)}/>
                </div>
              </div>
            </div>

            {/* Grupo 3: Detalles y Asignación */}
            <div style={{borderBottom:"1px solid var(--line)", paddingBottom:14}}>
              <h4 style={{margin:"0 0 12px",color:"var(--accent)",fontSize:13,textTransform:"uppercase",letterSpacing:".05em"}}>3. Detalles y Asignación</h4>
              <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:"12px 16px"}}>
                <div className="field">
                  <label>Día de Cambio *</label>
                  <input type="date" value={form.fecha} onChange={e=>set("fecha",e.target.value)} required/>
                </div>
                <div className="field">
                  <label>El cambio es</label>
                  <select value={form.el_cambio_es} onChange={e=>set("el_cambio_es",e.target.value)}>
                    <option value="">Selecciona…</option>
                    <option value="Genérico">Genérico</option>
                    <option value="Parcial">Parcial</option>
                  </select>
                </div>
                <div className="field">
                  <label>Responsable cambio (Desarrollador)</label>
                  <select value={form.responsable_cambio} onChange={e=>set("responsable_cambio",e.target.value)}>
                    <option value="">Selecciona…</option>
                    {teamList.map(name => <option key={name} value={name}>{name}</option>)}
                  </select>
                </div>
                <div className="field">
                  <label>Responsable libera cambio (Líder de desarrollo)</label>
                  <select value={form.responsable_libera} onChange={e=>set("responsable_libera",e.target.value)}>
                    <option value="">Selecciona…</option>
                    {teamList.map(name => <option key={name} value={name}>{name}</option>)}
                  </select>
                </div>
                <div className="field" style={{gridColumn:"span 2"}}>
                  <label>Sucursales</label>
                  <input type="text" value={form.sucursales} onChange={e=>set("sucursales",e.target.value)}/>
                </div>
                <div className="field" style={{gridColumn:"span 2"}}>
                  <label>Descripción del Cambio</label>
                  <textarea rows="2" value={form.descripcion} onChange={e=>set("descripcion",e.target.value)}/>
                </div>
                <div className="field" style={{gridColumn:"span 2"}}>
                  <label>Justificación del Cambio</label>
                  <textarea rows="2" value={form.justificacion} onChange={e=>set("justificacion",e.target.value)}/>
                </div>
              </div>
            </div>

            {/* Grupo 4: Operaciones e Implementación */}
            <div style={{borderBottom:"1px solid var(--line)", paddingBottom:14}}>
              <h4 style={{margin:"0 0 12px",color:"var(--accent)",fontSize:13,textTransform:"uppercase",letterSpacing:".05em"}}>4. Operaciones e Implementación</h4>
              <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:"12px 16px"}}>
                <div className="field">
                  <label>¿En qué área de operaciones se aplicará el cambio?</label>
                  <select value={form.area_operaciones} onChange={e=>set("area_operaciones",e.target.value)}>
                    <option value="">Selecciona…</option>
                    <option value="Oracle">Oracle</option>
                    <option value="Operaciones LAM">Operaciones LAM</option>
                    <option value="Operaciones Windows">Operaciones Windows</option>
                    <option value="Operaciones Unix">Operaciones Unix</option>
                  </select>
                </div>
                <div className="field">
                  <label>¿El sistema opera con DevSecOps?</label>
                  <select value={form.devsecops} onChange={e=>set("devsecops",e.target.value)}>
                    <option value="">Selecciona…</option>
                    <option value="Sí">Sí</option>
                    <option value="No">No</option>
                  </select>
                </div>
                <div className="field">
                  <label>¿Cuál es el esquema de Roll Back?</label>
                  <select value={form.esquema_rollback} onChange={e=>set("esquema_rollback",e.target.value)}>
                    <option value="">Selecciona…</option>
                    <option value="Parametría">Parametría</option>
                    <option value="Reverso">Reverso</option>
                  </select>
                </div>
                <div className="field">
                  <label>Resultado de la implementación</label>
                  <select value={form.estado} onChange={e=>set("estado",e.target.value)}>
                    <option value="">Selecciona…</option>
                    <option value="Por aplicar">Por aplicar</option>
                    <option value="Aplicado">Aplicado</option>
                    <option value="No aplicado">No aplicado</option>
                    <option value="Reversado">Reversado</option>
                    <option value="No aplicado por ventana">No aplicado por ventana</option>
                  </select>
                </div>
                {form.estado === "Reversado" && (
                  <div className="field" style={{gridColumn:"span 2"}}>
                    <label>Responsable de quien aplicó el Reverso</label>
                    <select value={form.responsable_reverso} onChange={e=>set("responsable_reverso",e.target.value)}>
                      <option value="">Selecciona…</option>
                      {teamList.map(name => <option key={name} value={name}>{name}</option>)}
                    </select>
                  </div>
                )}
              </div>
            </div>

            {/* Grupo 5: Datos de la Guardia */}
            <div>
              <h4 style={{margin:"0 0 12px",color:"var(--accent)",fontSize:13,textTransform:"uppercase",letterSpacing:".05em"}}>5. Datos de la Guardia</h4>
              <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"12px 16px"}}>
                <div className="field">
                  <label>Guardia Siguiente día Nombre</label>
                  <select value={form.guardia_siguiente_nombre} onChange={e=>handleGuardChange(e.target.value)}>
                    <option value="">Selecciona…</option>
                    {teamList.map(name => <option key={name} value={name}>{name}</option>)}
                  </select>
                </div>
                <div className="field">
                  <label>Teléfono de contacto <span style={{color:"var(--red)"}}>*</span></label>
                  <input type="text" value={form.telefono_contacto} onChange={e=>set("telefono_contacto",e.target.value)} required/>
                </div>
                <div className="field">
                  <label>Lugar físico de la guardia</label>
                  <input type="text" value={form.lugar_guardia} onChange={e=>set("lugar_guardia",e.target.value)}/>
                </div>
              </div>
            </div>

          </div>
          
          <div className="modal-actions" style={{borderTop:"1px solid var(--line)",paddingTop:14,marginTop:14}}>
            <button type="button" className="btn ghost" onClick={onClose}>Cancelar</button>
            <button type="submit" className="btn">Guardar</button>
          </div>
        </form>
      </div>
    );
  }

  return (
    <div className="modal-bg" onClick={onClose}>
      <form className="modal" onClick={e=>e.stopPropagation()} onSubmit={submit}>
        <h3>{record.id?"Editar":"Nuevo"} — {m.label}</h3>
        {m.fields.map(([key,label,type,req,opts])=>{
          // Solo mostrar campos de reposición para guardias de fin de semana
          if (m.table === "guards" && (key === "dia_reposicion" || key === "estado_reposicion") && form.tipo !== "Guardia fin de semana") {
            return null;
          }
          return (
            <div className="field" key={key} style={{animation:"fadeIn 0.2s ease"}}>
              <label>{label}{req?" *":""}</label>
              {type === "select" || type === "select_team" ?
                <select value={form[key]||""} onChange={e=>set(key,e.target.value)} required={req} disabled={isDisabled(key)}>
                  <option value="">Selecciona…</option>
                  {(type === "select_team" ? teamList : opts).map(o=><option key={o} value={o}>{o}</option>)}
                </select>
              : type === "textarea" ?
                <textarea rows="3" value={form[key]||""} onChange={e=>set(key,e.target.value)}/>
              :
                <input type={type} value={form[key]||""} onChange={e=>set(key,e.target.value)} required={req} disabled={isDisabled(key)}/>
              }
            </div>
          );
        })}
        <div className="modal-actions">
          <button type="button" className="btn ghost" onClick={onClose}>Cancelar</button>
          <button type="submit" className="btn">Guardar</button>
        </div>
      </form>
    </div>
  );
}

/* ---------- Rol de guardias (rotación) ---------- */
function GuardRoster({perm,onChange,data,currentUserEmail,role}){
  const [rows,setRows] = useState(null);
  const [err,setErr] = useState(null);
  const [editingId, setEditingId] = useState(null);
  const [selectedPersona, setSelectedPersona] = useState("");
  const [teamNames, setTeamNames] = useState([]);

  async function load(){
    const {data,error} = await db.from("guard_roster").select("*").order("orden",{ascending:true});
    if(error) setErr(error.message); else { setRows(data||[]); setErr(null); }
  }

  useEffect(()=>{
    load();
    if (db) {
      db.from("team")
        .select("nombre")
        .eq("estado", "Activo")
        .order("nombre", { ascending: true })
        .then(({ data }) => {
          if (data) setTeamNames(data.map(t => t.nombre));
        });
    }
  },[]);

  const turnos = ["Cambios nocturnos","Guardia matutina"];
  
  function nextId(list){
    if(!list.length) return null;
    return [...list].sort((a,b)=> (a.veces-b.veces) || (a.orden-b.orden))[0].id;
  }

  const canReassign = (rowPersona) => {
    if (role === "Administrador") return true;
    if (!data || !data.team || !currentUserEmail) return false;
    const currentUser = data.team.find(t => t.correo && t.correo.toLowerCase().trim() === currentUserEmail.toLowerCase().trim());
    if (!currentUser) return false;
    const currentUserName = currentUser.nombre;

    // 1. El usuario es el dueño de la guardia
    if (currentUserName === rowPersona) return true;

    // 2. El usuario es el líder del dueño de la guardia
    const occupant = data.team.find(t => t.nombre === rowPersona);
    if (occupant && occupant.lider === currentUserName) return true;

    return false;
  };

  async function savePersona(id, newPersona) {
    if (!newPersona) return;
    const { error } = await db.from("guard_roster").update({ persona: newPersona }).eq("id", id);
    if (error) {
      alert("Error al reasignar persona: " + error.message);
    } else {
      setEditingId(null);
      load();
      onChange && onChange();
    }
  }

  async function registrar(r){
    const d = new Date();
    if (r.turno === "Cambios nocturnos" || r.turno === "Guardia nocturna") {
      d.setDate(d.getDate() - 1);
    }
    const today = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
    const { error: err1 } = await db.from("guard_roster").update({veces:(r.veces||0)+1, ultima_guardia:today}).eq("id",r.id);
    if(err1) {
      alert("Error al actualizar la rotación: " + err1.message);
      return;
    }
    const { error: err2 } = await db.from("guards").insert({
      persona: r.persona,
      tipo: r.turno,
      fecha_inicio: today,
      fecha_fin: today,
      notas: "Registro automático desde rol de guardias"
    });
    if(err2) {
      alert("Rotación actualizada, pero hubo un error al crear el registro en el calendario: " + err2.message);
    }
    load(); onChange&&onChange();
  }

  async function reiniciar(turno){
    if(!confirm("¿Reiniciar la rotación de "+turno+"? Pone los contadores en cero.")) return;
    const ids = rows.filter(x=>x.turno===turno).map(x=>x.id);
    if(ids.length) await db.from("guard_roster").update({veces:0,ultima_guardia:null}).in("id",ids);
    load();
  }

  if(rows===null) return <div><h1 className="page-title">Rol de guardias</h1><p className="page-sub">Cargando…</p></div>;
  
  return (
    <div>
      <h1 className="page-title">Rol de guardias</h1>
      <p className="page-sub">Rotación de cambios tomada del Excel. La persona en verde es <b>quién sigue</b>; al registrar un cambio pasa el turno al siguiente.</p>
      {err && <div className="banner">Error: {err}</div>}
      <div className="grid grid-2">
        {turnos.map(t=>{
          const list = rows.filter(r=>r.turno===t).sort((a,b)=>a.orden-b.orden);
          const nid = nextId(list);
          return (
            <div className="card" key={t} style={{padding:0,overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px",borderBottom:"1px solid var(--line)",minWidth:"500px"}}>
                <h3 style={{margin:0}}>{t}</h3>
                {perm.del && <button className="btn ghost sm" onClick={()=>reiniciar(t)}>Reiniciar</button>}
              </div>
              {list.length===0 ? <div className="empty">Sin personas.</div> :
              <table style={{minWidth:"500px"}}>
                <thead><tr><th>#</th><th>Persona</th><th>Última</th><th>Veces</th><th></th></tr></thead>
                <tbody>
                  {list.map(r=>(
                    <tr key={r.id} style={r.id===nid?{background:HEX.green+"1f"}:null}>
                      <td>{r.orden}</td>
                      <td>
                        {editingId === r.id ? (
                          <div style={{display:"flex",alignItems:"center",gap:6}} onClick={e=>e.stopPropagation()}>
                            <select 
                              value={selectedPersona} 
                              onChange={e => setSelectedPersona(e.target.value)}
                              style={{
                                background:"var(--panel2)",
                                border:"1px solid var(--line)",
                                color:"var(--text)",
                                padding:"4px 8px",
                                borderRadius:6,
                                fontSize:13,
                                width:"160px"
                              }}
                            >
                              <option value="">-- Seleccionar --</option>
                              {teamNames.map(name => (
                                <option key={name} value={name}>{name}</option>
                              ))}
                            </select>
                            <button 
                              className="btn sm" 
                              style={{background:"var(--green)",padding:"4px 8px"}} 
                              onClick={() => savePersona(r.id, selectedPersona)}
                            >
                              ✓
                            </button>
                            <button 
                              className="btn sm ghost" 
                              style={{padding:"4px 8px"}} 
                              onClick={() => setEditingId(null)}
                            >
                              ✕
                            </button>
                          </div>
                        ) : (
                          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
                            <div>
                              {r.id===nid && <span className="pill" style={{background:HEX.green+"22",color:HEX.green,marginRight:6}}>sigue</span>}
                              {r.persona}
                            </div>
                            {perm.edit && canReassign(r.persona) && (
                              <button 
                                className="btn ghost sm" 
                                style={{padding:"2px 6px",fontSize:11,opacity:0.75}} 
                                onClick={(e) => {
                                  e.stopPropagation();
                                  setEditingId(r.id);
                                  setSelectedPersona(r.persona);
                                }}
                              >
                                Reasignar
                              </button>
                            )}
                          </div>
                        )}
                      </td>
                      <td>{r.ultima_guardia ? new Date(r.ultima_guardia).toLocaleDateString("es") : "—"}</td>
                      <td>{r.veces||0}</td>
                      <td style={{textAlign:"right"}}>
                        {perm.edit && r.id===nid && <button className="btn sm" onClick={()=>registrar(r)}>Registrar Guardia</button>}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ---------- ranking de cursos ---------- */
function CourseRanking({rows}){
  const rank = useMemo(()=>{
    const m={};
    rows.forEach(r=>{ const k=(r.curso||"").trim(); if(k) m[k]=(m[k]||0)+1; });
    return Object.entries(m).sort((a,b)=> b[1]-a[1]);

  return (
    <div className="card" style={{marginBottom:16}}>

/* ---------- componente de gráfica de línea (SVG nativo responsive) ---------- */
function DashboardLineChart({ title, chartData, areas, colors }) {
  const width = 500;
  const height = 180;
  const padding = { top: 15, right: 15, bottom: 25, left: 35 };

  let maxY = 4;
  chartData.forEach(d => {
    areas.forEach(a => {
      if (d[a] > maxY) maxY = d[a];
    });
  });
  maxY = Math.ceil(maxY / 4) * 4; // Ajustar a múltiplo de 4 para divisiones estéticas

  const getX = (index) => padding.left + (index * (width - padding.left - padding.right) / 3);
  const getY = (value) => height - padding.bottom - (value * (height - padding.top - padding.bottom) / maxY);

  return (
    <div className="card" style={{padding:"16px 20px", display:"flex", flexDirection:"column", gap:10}}>
      <h3 style={{margin:0, fontSize:13, fontWeight:600, color:"var(--text)"}}>
        {title}
      </h3>
      
      {/* Leyendas */}
      <div style={{display:"flex", flexWrap:"wrap", gap:"8px 12px", fontSize:10, color:"var(--muted)", marginBottom:4}}>
        {areas.map(a => (
          <div key={a} style={{display:"flex", alignItems:"center", gap:4}}>
            <span style={{width:8, height:8, borderRadius:"50%", background:colors[a]}}></span>
            <span>{a}</span>
          </div>
        ))}
      </div>

      <div style={{position:"relative", width:"100%", height:height}}>
        <svg viewBox={`0 0 ${width} ${height}`} width="100%" height="100%" style={{overflow:"visible"}}>
          {/* Grilla y líneas horizontales */}
          {[0, 1, 2, 3, 4].map(i => {
            const val = Math.round((maxY * i) / 4);
            const y = getY(val);
            return (
              <g key={i}>
                <line x1={padding.left} y1={y} x2={width - padding.right} y2={y} stroke="var(--line)" strokeWidth="1" strokeDasharray="3 3" />
                <text x={padding.left - 6} y={y + 3} fontSize="9" fill="var(--muted)" textAnchor="end">{val}</text>
              </g>
            );
          })}

          {/* Etiquetas del eje X */}
          {chartData.map((d, i) => (
            <text key={i} x={getX(i)} y={height - 5} fontSize="9" fill="var(--muted)" textAnchor="middle">{d.name}</text>
          ))}

          {/* Líneas de las áreas */}
          {areas.map(area => {
            const points = chartData.map((d, i) => `${getX(i)},${getY(d[area])}`).join(" ");
            const color = colors[area];
            return (
              <g key={area}>
                {/* Sombra de la línea */}
                <polyline points={points} fill="none" stroke={color} strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" opacity="0.1" />
                {/* Línea principal */}
                <polyline points={points} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                {/* Puntos en cada semana */}
                {chartData.map((d, i) => (
                  <circle key={i} cx={getX(i)} cy={getY(d[area])} r="3.5" fill="var(--panel)" stroke={color} strokeWidth="2" />
                ))}
              </g>
            );
          })}
        </svg>
      </div>
    </div>
  );
}

/* ---------- dashboard ---------- */
function Dashboard({data,go,onRefresh,role}){
  const [importing, setImporting] = useState(false);
  const perm = PERMS[role] || {create:false};

  if(!data) return (<div><h1 className="page-title">Dashboard</h1><p className="page-sub">Cargando…</p></div>);
  const today=startToday();
  const activos=data.team.filter(p=>p.estado==="Activo").length;
  const ausenciasCurso=data.leaves.filter(l=>{ const i=pd(l.fecha_inicio),f=pd(l.fecha_fin); return i&&f&&i<=today&&f>=today&&l.estado!=="Rechazado"; }).length;
  const guardiasAsign=data.guards.length;
  const ventanasProx=data.windows.filter(w=>w.fecha_hora&&new Date(w.fecha_hora)>=today&&w.estado!=="Cancelada").length;

  const eventos=[];
  data.windows.forEach(w=>{ if(w.fecha_hora) eventos.push({fecha:new Date(w.fecha_hora),tipo:"Ventana",txt:w.sistema,estado:w.estado}); });
  data.guards.forEach(g=>{ const f=pd(g.fecha_inicio); if(f) eventos.push({fecha:f,tipo:"Guardia",txt:`${g.persona} · ${g.tipo||""}`,estado:""}); });
  const proximos=eventos.filter(e=>e.fecha>=today).sort((a,b)=>a.fecha-b.fecha).slice(0,6);

  const mdcChanges = data.mdc_changes || [];
  const mdcHoy = mdcChanges
    .map(c => ({
      ...c,
      parsedFecha: pd(c.fecha)
    }))
    .filter(c => c.parsedFecha && c.parsedFecha.getTime() === today.getTime() && c.estado !== 'Cancelado')
    .sort((a, b) => a.parsedFecha - b.parsedFecha);

  const alertas=[];
  computeConflicts(data).forEach(c=>alertas.push(["red",`Choque de agenda: ${c.persona} (${c.date.toLocaleDateString("es",{day:"numeric",month:"short"})})`]));
  data.windows.filter(w=>w.estado==="En ejecución").forEach(w=>alertas.push(["amber",`Ventana en ejecución: ${w.sistema}`]));
  data.leaves.filter(l=>l.estado==="Pendiente").forEach(l=>alertas.push(["amber",`Permiso pendiente: ${l.persona}`]));
  data.rollbacks.filter(r=>r.estado==="Fallido").forEach(r=>alertas.push(["red",`Reverso fallido: ${r.release}`]));

  // --- Lógica de Gráficas de Línea (Último Mes, por Semana, 4 Áreas Internas) ---
  const AREAS = ["LAM", "Plataformas y Habilitadores", "Canales Transaccionales", "Core de Pagos y Préstamo"];
  const chartColors = {
    "LAM": "var(--accent)",
    "Plataformas y Habilitadores": "var(--violet)",
    "Canales Transaccionales": "var(--green)",
    "Core de Pagos y Préstamo": "var(--amber)"
  };

  const getWeekIndex = (date, todayVal) => {
    const diffTime = todayVal - date;
    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
    if (diffDays >= 0 && diffDays < 7) return 3;   // Semana 4 (más reciente)
    if (diffDays >= 7 && diffDays < 14) return 2;  // Semana 3
    if (diffDays >= 14 && diffDays < 21) return 1; // Semana 2
    if (diffDays >= 21 && diffDays < 28) return 0; // Semana 1 (más antigua)
    return -1;
  };

  const getChangeArea = (c) => {
    // 1. Buscar por responsable_cambio en el equipo
    if (c.responsable_cambio) {
      const member = data.team?.find(t => t.nombre === c.responsable_cambio);
      if (member && member.area) return member.area;
    }
    // 2. Buscar por responsable_libera (líder) en el equipo
    if (c.responsable_libera) {
      const member = data.team?.find(t => t.nombre === c.responsable_libera);
      if (member && member.area) return member.area;
    }
    // 3. Fallback basado en celula_fabrica o texto
    const celulaLower = String(c.celula_fabrica || "").toLowerCase();
    if (celulaLower.includes("lam")) return "LAM";
    if (celulaLower.includes("plataforma") || celulaLower.includes("habilitador")) return "Plataformas y Habilitadores";
    if (celulaLower.includes("canal") || celulaLower.includes("transaccional")) return "Canales Transaccionales";
    if (celulaLower.includes("core") || celulaLower.includes("pago") || celulaLower.includes("prestamo")) return "Core de Pagos y Préstamo";
    
    return null;
  };

  const getRollbackArea = (r) => {
    // 1. Intentar encontrar el cambio MDC asociado en el release
    const change = mdcChanges.find(c => 
      (c.folio_hydra && r.release && r.release.includes(c.folio_hydra)) ||
      (c.ticket && r.release && r.release.includes(c.ticket)) ||
      (c.req && r.release && r.release.includes(c.req)) ||
      (c.ot && r.release && r.release.includes(c.ot))
    );
    if (change) {
      const area = getChangeArea(change);
      if (area) return area;
    }
    // 2. Buscar por responsable del reverso en la tabla team
    if (r.responsable) {
      const member = data.team?.find(t => t.nombre === r.responsable);
      if (member && member.area) return member.area;
    }
    // 3. Heurística basada en el texto del release
    const relLower = String(r.release || "").toLowerCase();
    if (relLower.includes("lam")) return "LAM";
    if (relLower.includes("plataforma") || relLower.includes("habilitador")) return "Plataformas y Habilitadores";
    if (relLower.includes("canal") || relLower.includes("transaccional")) return "Canales Transaccionales";
    if (relLower.includes("core") || relLower.includes("pago") || relLower.includes("prestamo")) return "Core de Pagos y Préstamo";
    
    return null;
  };

  const changesData = [
    { name: "Semana 1", "LAM": 0, "Plataformas y Habilitadores": 0, "Canales Transaccionales": 0, "Core de Pagos y Préstamo": 0 },
    { name: "Semana 2", "LAM": 0, "Plataformas y Habilitadores": 0, "Canales Transaccionales": 0, "Core de Pagos y Préstamo": 0 },
    { name: "Semana 3", "LAM": 0, "Plataformas y Habilitadores": 0, "Canales Transaccionales": 0, "Core de Pagos y Préstamo": 0 },
    { name: "Semana 4", "LAM": 0, "Plataformas y Habilitadores": 0, "Canales Transaccionales": 0, "Core de Pagos y Préstamo": 0 }
  ];

  mdcChanges.forEach(c => {
    if (!c.fecha) return;
    const date = pd(c.fecha);
    if (!date) return;
    const weekIdx = getWeekIndex(date, today);
    if (weekIdx !== -1) {
      const area = getChangeArea(c);
      if (area && AREAS.includes(area)) {
        changesData[weekIdx][area] += 1;
      }
    }
  });

  const rollbacksList = data.rollbacks || [];
  const rollbacksData = [
    { name: "Semana 1", "LAM": 0, "Plataformas y Habilitadores": 0, "Canales Transaccionales": 0, "Core de Pagos y Préstamo": 0 },
    { name: "Semana 2", "LAM": 0, "Plataformas y Habilitadores": 0, "Canales Transaccionales": 0, "Core de Pagos y Préstamo": 0 },
    { name: "Semana 3", "LAM": 0, "Plataformas y Habilitadores": 0, "Canales Transaccionales": 0, "Core de Pagos y Préstamo": 0 },
    { name: "Semana 4", "LAM": 0, "Plataformas y Habilitadores": 0, "Canales Transaccionales": 0, "Core de Pagos y Préstamo": 0 }
  ];

  rollbacksList.forEach(r => {
    if (!r.fecha) return;
    const date = pd(r.fecha);
    if (!date) return;
    const weekIdx = getWeekIndex(date, today);
    if (weekIdx !== -1) {
      const area = getRollbackArea(r);
      if (area && AREAS.includes(area)) {
        rollbacksData[weekIdx][area] += 1;
      }
    }
  });

  const kpis=[
    ["Personal activo",activos,I.team,"team"],
    ["Ausencias en curso",ausenciasCurso,I.leave,"leaves"],
    ["Guardias asignadas",guardiasAsign,I.guard,"guards"],
    ["Ventanas próximas",ventanasProx,I.wind,"windows"],
  ];

  function mapExcelRow(row) {
    const keys = Object.keys(row);
    const findVal = (possibleNames) => {
      const key = keys.find(k => possibleNames.some(p => k.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "") === p));
      return key ? String(row[key]).trim() : null;
    };

    // Mapeo completo de las 24 columnas solicitadas para MDC
    const responsable_it = findVal(["responsable it", "responsable del area it", "it manager", "responsable_it"]);
    const celula_fabrica = findVal(["celula o fabrica", "celula o fabrica.", "celula", "fabrica", "celula/fabrica", "celula_fabrica"]);
    const req = findVal(["req", "req.", "requerimiento"]);
    const ot = findVal(["ot", "orden de trabajo"]);
    const folio_simba = findVal(["folio de simba", "folio simba", "simba"]);
    const tipo_cambio = findVal(["tipo de cambio", "tipo_cambio", "tipo"]);
    const folio_hydra = findVal(["folio del cambio hydra", "folio hydra", "hydra"]);
    
    // Parsear fecha
    let fechaRaw = findVal(["dia de cambio", "fecha", "dia", "date", "fecha de cambio", "fecha programada"]);
    let fecha = null;
    if (fechaRaw) {
      if (!isNaN(fechaRaw) && Number(fechaRaw) > 30000) {
        const dateObj = new Date((Number(fechaRaw) - 25569) * 86400 * 1000);
        fecha = dateObj.toISOString().slice(0, 10);
      } else {
        const d = new Date(fechaRaw);
        if (!isNaN(d.getTime())) {
          fecha = d.toISOString().slice(0, 10);
        } else {
          const parts = fechaRaw.split("/");
          if (parts.length === 3) {
            if (parts[2].length === 4) {
              fecha = `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
            }
          }
        }
      }
    }

    const responsable_cambio = findVal(["responsable cambio", "desarrollador", "desarrolladora", "responsable_cambio", "responsable"]);
    const responsable_libera = findVal(["responsable libera cambio", "responsable libera", "lider", "lider de desarrollo", "responsable_libera"]);
    const pais = findVal(["pais", "country"]);
    const descripcion = findVal(["descripcion", "descripcion del cambio", "detalle", "cambio", "description", "actividad", "resumen"]);
    const justificacion = findVal(["justificacion", "justificacion del cambio", "justificacion_cambio"]);
    const el_cambio_es = findVal(["el cambio es", "cambio es", "el_cambio_es"]);
    const sucursales = findVal(["sucursales"]);
    const area_operaciones = findVal(["area de operaciones", "area de operaciones donde se aplicara el cambio", "area_operaciones"]);
    const devsecops = findVal(["devsecops", "el sistema opera con devsecops"]);
    const esquema_rollback = findVal(["rollback", "esquema de rollback", "esquema rollback", "esquema_rollback"]);
    const guardia_siguiente_nombre = findVal(["guardia siguiente dia nombre", "guardia siguiente", "guardia", "guardia_siguiente_nombre"]);
    const telefono_contacto = findVal(["telefono de contacto", "telefono", "telefono_contacto"]);
    const lugar_guardia = findVal(["lugar fisico de la guardia", "lugar", "lugar_guardia"]) || "Torre 1 Piso 6";
    const estado = findVal(["resultado de la implementacion", "resultado", "estado", "status", "situacion"]) || "No aplicado";
    const responsable_reverso = findVal(["responsable de quien aplico el reverso", "responsable reverso", "responsable_reverso"]);
    const rancher = findVal(["rancher"]);

    // Columnas virtuales para mantener compatibilidad en UI/Dashboard
    const sistema = celula_fabrica || "Sistema Desconocido";
    const ticket = folio_hydra || folio_simba || ot || req || "";

    const excel_row_id = ticket || `${fecha || 'sindate'}_${sistema.replace(/\s+/g, '_')}_${(responsable_cambio || 'sinresp').replace(/\s+/g, '_')}`;

    return {
      excel_row_id,
      responsable_it,
      celula_fabrica,
      req,
      ot,
      folio_simba,
      tipo_cambio,
      folio_hydra,
      fecha,
      responsable_cambio,
      responsable_libera,
      pais,
      descripcion,
      justificacion,
      el_cambio_es,
      sucursales,
      area_operaciones,
      devsecops,
      esquema_rollback,
      guardia_siguiente_nombre,
      telefono_contacto,
      lugar_guardia,
      estado,
      responsable_reverso,
      rancher,
      sistema,
      ticket
    };
  }

  async function handleExcelImport(e){
    const file = e.target.files[0];
    if(!file) return;
    
    setImporting(true);
    const reader = new FileReader();
    reader.onload = async (evt) => {
      try {
        const arrayBuffer = evt.target.result;
        const workbook = XLSX.read(new Uint8Array(arrayBuffer), {type: 'array'});
        
        let sheetName = workbook.SheetNames.find(n => n.toUpperCase() === "MDC");
        if (!sheetName) {
          sheetName = workbook.SheetNames[0];
          alert(`No se encontró la pestaña 'MDC'. Se leerán los datos de la pestaña: '${sheetName}'`);
        }
        
        const worksheet = workbook.Sheets[sheetName];
        const jsonData = XLSX.utils.sheet_to_json(worksheet);
        
        if(jsonData.length === 0){
          alert("El archivo está vacío o no tiene datos válidos.");
          setImporting(false);
          return;
        }
        
        const rowsToUpsert = jsonData.map(mapExcelRow).filter(row => row.sistema && row.sistema !== "Sistema Desconocido");
        
        if (rowsToUpsert.length === 0) {
          alert("No se encontraron registros de cambios válidos en el archivo.");
          setImporting(false);
          return;
        }
        
        const { error } = await db.from("mdc_changes").upsert(rowsToUpsert, { onConflict: "excel_row_id" });
        
        if (error) {
          throw error;
        }
        
        alert(`¡Éxito! Se cargaron/actualizaron ${rowsToUpsert.length} cambios desde la pestaña '${sheetName}'.`);
        if(onRefresh) onRefresh();
      } catch (err) {
        alert("Error al importar el archivo Excel: " + (err.message || err));
      } finally {
        setImporting(false);
        e.target.value = ""; 
      }
    };
    reader.readAsArrayBuffer(file);
  }

  return (
    <div>
      <h1 className="page-title">Dashboard</h1>
      <p className="page-sub">Vista general del equipo · {today.toLocaleDateString("es",{dateStyle:"full"})}</p>
      <div className="grid kpis" style={{marginBottom:18}}>
        {kpis.map(([l,n,ic,k])=>(
          <div className="card kpi" key={l} style={{cursor:"pointer"}} onClick={()=>go(k)}>
            <span className="ico"><Icon d={ic} size={22}/></span>
            <div className="n">{n}</div><div className="l">{l}</div>
          </div>
        ))}

      {/* Gráficas de Línea de Cambios y Reverso por Área */}
      <div className="grid" style={{gridTemplateColumns:"repeat(auto-fit, minmax(400px, 1fr))", marginBottom:18}}>
        <DashboardLineChart title="Cambios por Área (Último Mes)" chartData={changesData} areas={AREAS} colors={chartColors} />
        <DashboardLineChart title="Reversos por Área (Último Mes)" chartData={rollbacksData} areas={AREAS} colors={chartColors} />
      </div>

      <div className="grid" style={{gridTemplateColumns:"repeat(auto-fit, minmax(300px, 1fr))"}}>
        <div className="card">
          <h3 style={{marginTop:0}}>Próximos eventos</h3>
          {proximos.length===0 ? <p className="page-sub">No hay eventos próximos.</p> :
            proximos.map((e,i)=>(
              <div className="alert-row" key={i}>
                <span className="dot" style={{background:e.tipo==="Ventana"?C.accent:C.violet}}></span>
                <div>
                  <div>{e.tipo}: <b>{e.txt}</b> {e.estado&&<Pill v={e.estado}/>}</div>
                  <div className="page-sub" style={{margin:0}}>{e.fecha.toLocaleDateString("es",{dateStyle:"medium"})}</div>
                </div>
              </div>
            ))}
        </div>
        <div className="card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:0,marginBottom:14}}>
            <h3 style={{margin:0}}><Icon d={I.wind} size={16}/> Cambios de Hoy (MDC)</h3>
          </div>
          {mdcHoy.length===0 ? <p className="page-sub">No hay cambios programados para hoy en MDC.</p> :
            mdcHoy.map((e,i)=>(
              <div className="alert-row" key={i}>
                <span className="dot" style={{background:C.green}}></span>
                <div style={{flex:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <b style={{fontSize:13}}>{e.sistema}</b>
                    {e.ticket && <span style={{fontSize:10,background:"var(--panel2)",padding:"1px 5px",borderRadius:4,color:"var(--muted)",fontWeight:600}}>{e.ticket}</span>}
                  </div>
                  <div style={{fontSize:12,marginTop:2,color:"var(--text)"}}>{e.descripcion}</div>
                  <div className="page-sub" style={{margin:"6px 0 0",fontSize:11,display:"flex",justifyContent:"space-between",color:"var(--muted)"}}>
                    <span>Resp: {e.responsable_cambio || e.responsable || "Sin asignar"}</span>
                    <span>{e.parsedFecha.toLocaleDateString("es",{day:"numeric",month:"short"})}</span>
                  </div>
                </div>
              </div>
            ))}
        </div>
        <div className="card">
          <h3 style={{marginTop:0}}><Icon d={I.bell} size={16}/> Alertas</h3>
          {alertas.length===0 ? <p className="page-sub">Todo en orden, sin alertas.</p> :
            alertas.slice(0,8).map(([c,t],i)=>(
              <div className="alert-row" key={i}><span className="dot" style={{background:C[c]}}></span><div>{t}</div></div>
            ))}
        </div>
      </div>
    </div>
  );
}

/* ---------- calendario ---------- */
function Calendar({data}){
  const [cursor,setCursor]=useState(()=>{ const t=new Date(); return new Date(t.getFullYear(),t.getMonth(),1,12,0,0); });
  const byDay=useMemo(()=>{
    const map={};
    const push=(d,ev)=>{ const k=dkey(d); (map[k]=map[k]||[]).push(ev); };
    if(data){
      data.leaves.forEach(l=>{ if(l.estado==="Rechazado")return; const a=pd(l.fecha_inicio),b=pd(l.fecha_fin)||a; if(!a)return; let d=new Date(a),i=0; while(d<=b&&i<400){ push(new Date(d),{color:"amber",label:`${l.persona} · ${l.tipo||"Permiso"}`,persona:l.persona,kind:"leave"}); d.setDate(d.getDate()+1);i++; } });
      data.guards.forEach(g=>{ const a=pd(g.fecha_inicio),b=pd(g.fecha_fin)||a; if(!a)return; let d=new Date(a),i=0; while(d<=b&&i<400){ push(new Date(d),{color:"violet",label:`${g.persona} · ${g.tipo||"Guardia"}${g.hora_inicio ? ' ('+g.hora_inicio+')' : ''}`,persona:g.persona,kind:"guard"}); d.setDate(d.getDate()+1);i++; } });
      data.windows.forEach(w=>{ 
        if(!w.fecha_hora||w.estado==="Cancelada")return; 
        const datePart=String(w.fecha_hora).slice(0,10);
        const parsed=pd(datePart);
        if(parsed) push(parsed,{color:"accent",label:`${w.sistema}`,kind:"window"}); 
      });
    }
    // marcar choques
    Object.values(map).forEach(evs=>{
      const personas={};
      evs.forEach(e=>{ if(e.persona){ personas[e.persona]=personas[e.persona]||{}; personas[e.persona][e.kind]=true; } });
      evs.forEach(e=>{ if(e.persona && personas[e.persona].leave && personas[e.persona].guard) e.conflict=true; });
    });
    return map;
  },[data]);

  const y=cursor.getFullYear(), mo=cursor.getMonth();
  const first=new Date(y,mo,1,12,0,0);
  const startDow=(first.getDay()+6)%7; // lunes=0
  const daysInMonth=new Date(y,mo+1,0).getDate();
  const todayK=dkey(startToday());
  const cells=[];
  for(let i=0;i<startDow;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(new Date(y,mo,d,12,0,0));
  while(cells.length%7!==0) cells.push(null);

  const dows=["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
  return (
    <div>
      <h1 className="page-title">Calendario</h1>
      <p className="page-sub">Guardias, ventanas y permisos en una sola vista. Los choques de agenda se marcan en rojo.</p>
      <div className="cal-bar">
        <button className="btn ghost sm" onClick={()=>setCursor(new Date(y,mo-1,1))}><Icon d={I.left} size={16}/></button>
        <h2>{cursor.toLocaleDateString("es",{month:"long",year:"numeric"})}</h2>
        <button className="btn ghost sm" onClick={()=>setCursor(new Date(y,mo+1,1))}><Icon d={I.right} size={16}/></button>
        <button className="btn ghost sm" onClick={()=>{const t=new Date();setCursor(new Date(t.getFullYear(),t.getMonth(),1));}}>Hoy</button>
      </div>
      <div className="card">
        <div className="cal-head">{dows.map(d=><div key={d}>{d}</div>)}</div>
        <div className="cal-grid">
          {cells.map((d,i)=>{
            if(!d) return <div key={i} className="cal-cell off"></div>;
            const k=dkey(d); const evs=byDay[k]||[];
            return (
              <div key={i} className={"cal-cell"+(k===todayK?" today":"")}>
                <div className="cal-day">{d.getDate()}</div>
                {evs.slice(0,4).map((e,j)=>(
                  <div key={j} className={"cal-ev"+(e.conflict?" conflict":"")} style={{background:HEX[e.color]}} title={e.label}>{e.label}</div>
                ))}
                {evs.length>4 && <div className="page-sub" style={{margin:0,fontSize:11}}>+{evs.length-4} más</div>}
              </div>
            );
          })}
        </div>
        <div className="legend">
          <span><i style={{background:HEX.violet}}></i> Guardia</span>
          <span><i style={{background:HEX.accent}}></i> Ventana</span>
          <span><i style={{background:HEX.amber}}></i> Permiso</span>
          <span><i style={{background:HEX.red,width:10,height:10,border:"2px solid "+HEX.red,background:"transparent"}}></i> Choque de agenda</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
